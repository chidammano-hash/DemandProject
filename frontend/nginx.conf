server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://api:8000;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(domains|jobs|clustering|forecast|inventory|dashboard|health|chat|dfu|competition|bench|market-intelligence|inv-planning|fill-rate|control-tower|ai-planner|storyboard|supply|analytics|finance|sop|events|scenarios|auth|users|data-quality|notifications|collaboration|demand-signals|fva|reports|webhooks|cache|config)/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
