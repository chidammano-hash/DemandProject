server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://api:8000;" always;

    # --- Compression ---
    # Compress text/json responses including those proxied from FastAPI.
    # `gzip_proxied any` is required to compress upstream responses; without it
    # nginx skips compression for anything coming through proxy_pass.
    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/javascript
        text/xml
        image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy. Prefix list MUST stay in sync with frontend/vite.config.ts —
    # a missing prefix here makes the SPA fall through to index.html and the browser
    # gets HTML back instead of JSON.
    location ~ ^/(domains|health|chat|forecast|forecasts|sku|sku-features|sku-chat|competition|market-intelligence|inventory|inventory-backtest|dashboard|clustering|jobs|inv-planning|fill-rate|ai-planner|ai-champion|ai-copilot|control-tower|storyboard|supply|analytics|finance|sop|events|scenarios|auth|users|customers|dfus|items|locations|sales|times|data-quality|notifications|collaboration|demand-signals|demand-history|fva|reports|webhooks|cache|config|sql-runner|sourcing|purchase-orders|lgbm-tuning|cluster-eda|cluster-experiments|champion-experiments|champion-sweeps|feature-lab|accuracy-budget|model-tuning|customer-analytics|backtest-management|forecast-release|integration|admin)(?:/|$) {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
