server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(domains|jobs|clustering|forecast|inventory|dashboard|health|chat|dfu|competition|bench|market-intelligence|inv-planning|fill-rate|control-tower|ai-planner|storyboard|supply|analytics|finance|sop|events|scenarios|auth|users|data-quality|notifications|collaboration|demand-signals|fva|reports|webhooks|cache|config)/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
