<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supply Chain Command Center</title>
    <!--
      FOUC fix: apply stored or OS-preferred color mode to <html> BEFORE React
      paints, so the first frame matches the final theme. Mirrors the logic in
      hooks/useTheme.ts (localStorage key: ds-color-mode).
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("ds-color-mode");
          var mode;
          if (stored === "light" || stored === "soft" || stored === "dark") {
            mode = stored;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            mode = "dark";
          } else {
            mode = "light";
          }
          var root = document.documentElement;
          if (mode === "dark") root.classList.add("dark");
          else if (mode === "soft") root.classList.add("light", "soft");
          else root.classList.add("light");
          root.setAttribute("data-theme", "general");
          root.setAttribute("data-mode", mode);
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
