experiment:
  name: "expert_panel_v1"
  seed: 42
  n_dfus: 5000
  sampling_method: "proportional"   # proportional | equal | sqrt
  n_timeframes: 5                   # quick validation (not full 10)
  n_workers: 8                      # parallel workers for statistical models
  output_dir: "data/expert_panel/results/expert_panel"
  loc_filter: null                  # e.g. '1401-BULK' — runs all DFUs at that loc instead of sampling

demand_classification:
  adi_threshold: 1.32               # Syntetos-Boylan ADI boundary
  cv2_threshold: 0.49               # Syntetos-Boylan CV² boundary
  high_volume_percentile: 90        # percentile for high/low volume split
  min_history_months: 6             # minimum months to classify

statistical_models:
  holt_winters:
    enabled: true
    seasonal_periods: 12
    trend: "add"
    seasonal: "add"
    damped_trend: true
    min_history: 25                 # 2*seasonal_periods + 1
  simple_es:
    enabled: true
    smoothing_level: null           # null = auto-optimize
    min_history: 3
  croston_sba:
    enabled: true
    alpha: 0.1
    min_history: 6
    min_nonzero: 2                  # need at least 2 non-zero periods
  auto_arima:
    enabled: true                   # skips gracefully if pmdarima not installed
    max_p: 3
    max_q: 3
    seasonal: true
    m: 12
    min_history: 24
  theta:
    enabled: true
    period: 12
    min_history: 12

tree_models:
  lgbm:
    enabled: true
    use_existing_config: true       # inherit from config/algorithm_config.yaml
  catboost:
    enabled: true
    use_existing_config: true
  xgboost:
    enabled: true
    use_existing_config: true

baselines:
  seasonal_naive:
    enabled: true
    min_history: 12                 # need at least 12 months for seasonal lag
  rolling_mean:
    enabled: true
    window: 6
    min_history: 6
  ridge:
    enabled: true
    alpha: 100.0                    # higher alpha needed with RobustScaler to handle ill-conditioned matrices

comparison:
  external_forecast_model_id: "external"
  champion_model_ids:
    - lgbm_cluster
    - catboost_cluster
    - xgboost_cluster

portfolio_optimizer:
  max_algorithms: 6                 # complexity budget
  min_segment_dfus: 30              # minimum DFUs per segment for reliable estimate
  min_dfu_coverage_pct: 0.5         # coverage threshold — below this, accuracy gets coverage-weighted
  coverage_weighted: true           # adj_acc = cov*algo_acc + (1-cov)*naive_acc for low-coverage algos
  naive_floor: true                 # never assign algo worse than seasonal_naive per segment

hybrid_ensemble:
  enabled: true
  # DFU accuracy matrix settings
  min_n_months: 2                   # minimum matched months for reliable per-DFU WAPE
  # Meta-router (LightGBM classifier) settings
  meta_n_estimators: 300
  meta_learning_rate: 0.05
  meta_num_leaves: 31
  meta_min_child_samples: 5
  meta_subsample: 0.8
  meta_colsample_bytree: 0.8
  meta_reg_lambda: 1.0
  meta_class_weight: "balanced"
  meta_random_state: 42
  meta_verbose: -1
  meta_min_n_months_filter: 2
  # Routing settings
  confidence_threshold: 0.6         # meta-router confidence below this → use blend
  blend_top_k: 3                    # number of top algorithms to blend for low-confidence DFUs
