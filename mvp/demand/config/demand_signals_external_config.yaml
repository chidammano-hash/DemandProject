# demand_signals_external_config.yaml — Spec 08-06: External demand signal sources

sources:
  weather:
    provider: openweathermap
    api_key: "${OPENWEATHER_API_KEY}"
    category_mapping:
      freeze: beverages
      heat: hvac

  economic:
    provider: fred
    api_key: "${FRED_API_KEY}"
    series:
      - CPIAUCSL
      - UMCSENT
      - RSXFS

decomposition:
  method: stl
  period: 12
  seasonal_window: 13
