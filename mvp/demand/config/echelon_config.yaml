echelon:
  # Service level Z-score for echelon safety stock (1.645 = 95%)
  z_score_default: 1.645
  default_service_level: 0.95

  # Minimum downstream nodes to apply echelon pooling
  min_downstream_nodes: 2

  # Cascade risk scoring weight multiplier
  cascade_risk_multiplier: 1.0

  # Alert when DC coverage drops below this (days)
  coverage_alert_threshold_days: 7

  # DC lead time fallback (days) when not in dim_echelon_network
  default_lt_days: 10
  default_lt_std_days: 2.0

scheduler:
  job_type: compute_echelon_targets
  cron: "0 4 * * 1"      # Weekly, Monday at 4am
