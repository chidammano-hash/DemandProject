# 5 strategies to improve beyond Run 8 (71.70% accuracy, WAPE 28.30%)
#
# Run 8 baseline params:
#   lr=0.015, n_estimators=1500, num_leaves=63, max_depth=10,
#   reg_lambda=3.0, subsample=0.8, colsample=0.8, min_child=20
#
# Current production config adds:
#   reg_alpha=0.1, path_smooth=2.0, min_gain_to_split=0.01,
#   feature_fraction_bynode=0.7, bagging_freq=1, max_depth=-1
#
# Usage:
#   uv run python scripts/ml/auto_tune.py --runs 5 \
#       --strategies-file config/run9_to_13_strategies.yaml
#
#   Add --promote to auto-promote the best run to algorithm_config.yaml
#   Add --dry-run to preview configs without executing

strategies:

  # ── Strategy 1: More trees, finer learning ─────────────────────────────────
  - label: "patience_2500"
    description: "2500 trees at LR 0.012 — finer gradient steps with 67% more boosting rounds"
    overrides:
      n_estimators: 2500
      learning_rate: 0.012

  # ── Strategy 2: Wider leaf topology ────────────────────────────────────────
  - label: "wider_leaves_128"
    description: "127 leaves to capture complex demand patterns — compensated with higher min_child and path_smooth"
    overrides:
      num_leaves: 127
      min_child_samples: 40
      path_smooth: 4.0

  # ── Strategy 3: Heavy regularization ───────────────────────────────────────
  - label: "deep_regularization"
    description: "Strong L1+L2 + higher split threshold — maximum overfitting resistance across clusters"
    overrides:
      reg_lambda: 5.0
      reg_alpha: 0.3
      path_smooth: 3.0
      min_gain_to_split: 0.03

  # ── Strategy 4: Stochastic diversity ───────────────────────────────────────
  - label: "stochastic_diversity"
    description: "Heavy row+col+node dropout — forces each tree to learn different patterns, needs more trees"
    overrides:
      subsample: 0.65
      colsample_bytree: 0.65
      feature_fraction_bynode: 0.5
      n_estimators: 2000

  # ── Strategy 5: Combined best ideas ────────────────────────────────────────
  - label: "combined_best"
    description: "Balanced blend of patience + wider leaves + moderate regularization + stochastic diversity"
    overrides:
      n_estimators: 2500
      learning_rate: 0.012
      num_leaves: 95
      min_child_samples: 30
      subsample: 0.75
      colsample_bytree: 0.75
      feature_fraction_bynode: 0.6
      reg_lambda: 2.5
      reg_alpha: 0.2
      path_smooth: 3.0
