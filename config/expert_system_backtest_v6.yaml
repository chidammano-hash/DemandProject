experiment:
  n_timeframes: 10
  forecast_horizon: 6
  max_lags: 4
  algorithm_id: "ExpSys"
  plan_version: "ExpSys_v6"
  output_dir: "data/expert_system_backtest_v6"
  n_workers: 14
  parallel_timeframes: 1       # SERIAL: prevents MPS contention (nhits+nbeats+chronos)

# C7: Remove pre-launch structural zeros before fitting — highest-voted enhancement.
# Leading zeros corrupt ADI/CV² classification, seasonal indices, and DL normalization.
preprocessing:
  trim_leading_zeros: true

demand_classification:
  adi_threshold: 1.32
  cv2_threshold: 0.49
  high_volume_percentile: 90
  min_history_months: 6
  cv2_volatile_threshold: 1.0       # erratic_mild (cv2<1.0) / erratic_volatile (cv2≥1.0)
  smooth_short_history_months: 18   # smooth_low_short (<18mo) / smooth_low (≥18mo)
  insufficient_short_max_periods: 2 # C10: 1–2 period DFUs route to rolling_mean directly

assignment:
  # v6 — 10 enhancements voted by 10 expert agents
  erratic_volatile:    nhits         # A1: adv panel nhits=49.3% vs autoces=42.4%; +6.9pp
  erratic_mild:        imapa         # B1: full coverage; 43.2% vs nbeats coverage-adjusted
  smooth_high:         mstl          # proven: 75.43% ExecLag
  smooth_low:          nbeats        # proven: 68.87% ExecLag
  smooth_low_short:    chronos       # zero-shot; no training-history requirement
  insufficient:        chronos       # best for 6–12mo insufficient (A2 fixes batch cliff)
  insufficient_short:  rolling_mean  # C10: 1–2 periods — no model works; use recent mean
  intermittent_low:    tsb
  lumpy_low:           tsb
  fallbacks:
    nhits:             [simple_es, rolling_mean]       # B8: simple_es before rolling_mean
    nbeats:            [simple_es, rolling_mean]       # B8
    chronos:           [mstl, simple_es, rolling_mean] # B8
    imapa:             [simple_es, rolling_mean]       # B8
    mstl:              [simple_es, rolling_mean]       # B8
    tsb:               [mstl, simple_es, rolling_mean] # B8
    autoces:           [mstl, simple_es, rolling_mean] # B8
    default:           [simple_es, rolling_mean]       # B8: global default

nhits:
  input_size: 24
  h: 6
  max_steps: 500
  batch_size: 64          # A4: was 1024 — adv panel gap explained by large-batch gradient dilution
  learning_rate: 0.001
  min_history: 6
  scaler_type: "robust"   # A8: median/IQR — spike-robust vs standard z-score

nbeats:
  variant: "generic"
  input_size: 24
  h: 6
  max_steps: 500
  batch_size: 64          # A3: was 1024 — 7-8pp gap vs adv panel (batch=32) confirmed
  learning_rate: 0.001
  min_history: 6
  scaler_type: "robust"   # A8: median/IQR for erratic_mild and smooth_low

chronos:
  model_size: "small"
  device: "mps"
  batch_size: 32          # A2: was 256 — 33pp gap on insufficient explained by batch normalization
  prediction_length: 6
  num_samples: 20

mstl:
  season_length: 12
  min_history: 12

tsb:
  alpha_d: 0.1
  alpha_p: 0.1
  min_nonzero: 2

rolling_mean:
  window: 3               # B3: was 6 — window=6 pulls in leading zeros for short-history DFUs
  min_history: 1

imapa:
  min_nonzero: 2

simple_es:
  min_history: 3          # B8: MLE-optimized smoothing — strictly better than equal-weight rolling_mean
