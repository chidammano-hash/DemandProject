# AI Planner FVA Backtest configuration
# Spec: docs/specs/PRD/PRD-ai-planner-fva-backtest.md (§8 Configuration)
# Loaded via: load_config("ai_planner_fva_backtest_config")

_includes: [shared_constants]

# ═══ Run defaults ════════════════════════════════════════════════════════════
defaults:
  window_months: 10                    # Walk-forward window length (PRD requirement)
  horizon_months: 3                    # Forecast lags 1..H to evaluate per recommendation
  as_of_offset_months: 1               # as_of_date = current_month - offset (1 = last completed month)
  prompt_version: v1.0.0               # Prompt template version for reproducibility audit
  baseline_model_id: external          # model_id in fact_external_forecast_monthly used as the AI's baseline.
                                       # Real data carries 'external' (source-system feed); 'champion' was a
                                       # PRD naming assumption that's never written to this table.

# ═══ Provider abstraction ════════════════════════════════════════════════════
# Provider drives where the LLM call goes. The LLMClient at
# common/ai/llm_client.py handles routing for all four providers below.
#
#   ollama (default):  local, $0, no network. Pull model first via `ollama pull`.
#   anthropic:         paid API, best quality. Requires ANTHROPIC_API_KEY env var.
#   openai:            paid API. Requires OPENAI_API_KEY env var.
#   openai_compat:     any OpenAI-compatible endpoint (Together, Fireworks,
#                      DeepInfra, Groq). Requires LLM_BASE_URL + LLM_API_KEY.
provider: ollama

# Per-provider model identifiers — only the entry matching `provider` is used.
models:
  ollama: llama3.1:8b                 # Recommended primary on M-series Mac (32B)
  anthropic: claude-opus-4-7
  openai: gpt-4o
  openai_compat: meta-llama/Llama-3.3-70B-Instruct-Turbo

# Per-provider endpoints. Ollama is loopback by default.
endpoints:
  ollama: http://localhost:11434/v1    # OpenAI-compatible Ollama API
  openai_compat: ${LLM_BASE_URL}       # e.g. https://api.together.xyz/v1

# ═══ Hybrid two-stage routing (cost optimization, see PRD §4.4) ═════════════
# Cheap small model screens for likely-KEEP DFUs; only flagged DFUs go to the
# primary provider. Off by default — turn on for large samples.
hybrid_routing:
  enabled: false
  screener_provider: ollama
  screener_model: llama3.1:8b
  screener_keep_threshold: 0.70        # Confidence above which screener emits KEEP

# ═══ Sampling strategy ═══════════════════════════════════════════════════════
sampling:
  default_mode: stratified             # stratified | full | targeted | cluster
  stratified:
    pct: 5                             # Target % of DFU universe to sample
    min_dfus: 500                      # Floor — never drop below this even if pct says less
    max_dfus: 10000                    # Cap — protects against runaway cost
    strata:                            # Stratification keys (must be persisted dim_sku columns)
      - cluster_assignment              # ml cluster label
      - abc_vol                         # ABC volume tier (A/B/C)
      # Note: `demand_pattern` is in-memory only during clustering; not on dim_sku.

# ═══ Apply guardrails (PRD §4.2) ═════════════════════════════════════════════
apply_guardrails:
  max_abs_pct_change: 50               # Reject AI recommendations outside [-50%, +50%]
  min_confidence: 0.60                 # Below this → treat as KEEP, log low_confidence
  require_evidence: true               # Reject if evidence_keys is empty
  reject_on_horizon_overflow: true     # Reject if apply_horizon > backtest horizon

# ═══ Cost controls ═══════════════════════════════════════════════════════════
cost_controls:
  max_concurrent_ai_calls: 4           # Bound LLM concurrency
  per_call_timeout_seconds: 60         # Ollama 32B is slower than paid APIs
  per_run_max_cost_usd: 1500           # Hard stop for paid providers; ignored for ollama
  per_call_estimated_cost_usd:         # USD per call by provider — for pre-flight
    ollama: 0.0                        # Local — no API spend
    anthropic: 0.11                    # Opus 4.7 with prompt caching
    openai: 0.05                       # GPT-4o
    openai_compat: 0.005               # Together / Fireworks Llama 70B

# ═══ Evaluation metric (must match CLAUDE.md "Formulas") ═════════════════════
evaluation:
  metric: wape                         # 100 - 100 * SUM(|F-A|) / |SUM(A)|
  per_lag_breakdown: true              # Report accuracy at each lag separately
  exclude_zero_actuals: false          # Whether DFUs with zero actuals in window count

# ═══ Ollama-specific runtime knobs ═══════════════════════════════════════════
ollama:
  keep_alive: 24h                      # Keep model loaded across long runs (default 5min)
  request_timeout_seconds: 120         # Per-request timeout for slow local inference
  num_ctx: 8192                        # Context window — fits ~5K input + headroom
  temperature: 0.0                     # Deterministic for reproducibility
