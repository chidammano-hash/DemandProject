# Integration Scan Orchestrator configuration.
# Local development reuses saved Codex/ChatGPT authentication through
# `codex exec`. Production switches to the OpenAI API and consumes API credits.

runtime:
  provider: codex # codex for local subscription auth; openai for production.

models:
  codex: gpt-5.5 # Local Codex CLI model using saved ChatGPT/Codex authentication.
  openai: gpt-5.5 # Production OpenAI API model.

auth:
  mode: auto # Inherit saved Codex CLI authentication on this laptop.

codex:
  binary: codex
  sandbox: read-only
  approval_policy: never
  reasoning_effort: high

temperature: 0.0 # Deterministic planning output.
max_tokens: 1200 # Enough for a compact structured response.
confidence_threshold: 0.8 # Below this, the planner should ask questions.
max_questions_per_scan: 3 # Keep the UI focused and fast.

cost_controls:
  per_call_timeout_seconds: 120 # Codex reasoning can take longer than a local chat completion.
