# Per-cluster hyperparameter overrides for LGBM
# Clusters with different demand patterns need different tuning
# Profiles are matched by cluster demand characteristics computed at runtime

cluster_profiles:
  sparse_intermittent:
    description: "High zero-demand percentage (>50%), low mean demand"
    match_criteria:
      zero_demand_pct_min: 0.50
      mean_demand_max: 20
    overrides:
      num_leaves: 15
      min_child_samples: 200
      reg_alpha: 1.0
      path_smooth: 10
      learning_rate: 0.03

  low_volume_volatile:
    description: "Low volume with high coefficient of variation"
    match_criteria:
      mean_demand_max: 50
      cv_demand_min: 1.0
    overrides:
      num_leaves: 31
      min_child_samples: 100
      reg_alpha: 0.5
      path_smooth: 5

  high_volume_stable:
    description: "High volume, low CV, predictable demand"
    match_criteria:
      mean_demand_min: 200
      cv_demand_max: 0.5
    overrides:
      num_leaves: 127
      min_child_samples: 30
      learning_rate: 0.01
      n_estimators: 2000

  seasonal_dominant:
    description: "Strong seasonal amplitude"
    match_criteria:
      seasonal_amplitude_min: 0.3
    overrides:
      num_leaves: 63
      min_child_samples: 50
      colsample_bytree: 0.9  # keep more features to capture seasonality

  default:
    description: "Fallback for clusters not matching any profile"
    match_criteria: {}
    overrides: {}

# Whether to enable per-cluster profile matching
enabled: true
# Minimum DFUs in cluster to apply profile (otherwise use default)
min_cluster_size: 100
