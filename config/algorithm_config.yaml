backtest:
  n_timeframes: 10
  output_dir: data/backtest
algorithms:
  lgbm:
    enabled: true
    model_id: lgbm_cluster
    cluster_strategy: per_cluster
    recursive: true
    shap_select: true
    shap_threshold: 0.95
    shap_top_n: null
    shap_sample_size: 500
    tune_inline: false
    params_file: null
    n_estimators: 1500
    learning_rate: 0.02
    num_leaves: 127
    min_child_samples: 40
    max_depth: -1
    min_gain_to_split: 0.01
    subsample: 0.8
    bagging_freq: 1
    colsample_bytree: 0.8
    feature_fraction_bynode: 0.7
    reg_lambda: 1.0
    reg_alpha: 0.1
    path_smooth: 4.0
    max_bin: 127
  catboost:
    enabled: true
    model_id: catboost_cluster
    cluster_strategy: per_cluster
    recursive: true
    shap_select: true
    shap_threshold: 0.95
    shap_top_n: null
    shap_sample_size: 500
    tune_inline: false
    params_file: null
    iterations: 3000
    learning_rate: 0.008
    depth: 10
    l2_leaf_reg: 7.5
    subsample: 0.85
    reg_lambda: 3.5
    grow_policy: Lossguide
    border_count: 64
    random_strength: 0.5
    min_data_in_leaf: 28
    colsample_bylevel: 0.85
    bagging_temperature: 0.4
    max_leaves: 127
    bootstrap_type: MVS
    model_size_reg: 0.08
    score_function: L2
    boost_from_average: true
    leaf_estimation_method: Newton
    leaf_estimation_iterations: 10
    max_ctr_complexity: 1
  xgboost:
    enabled: true
    model_id: xgboost_cluster
    cluster_strategy: per_cluster
    recursive: true
    shap_select: true
    shap_threshold: 0.95
    shap_top_n: null
    shap_sample_size: 500
    tune_inline: false
    params_file: null
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8
