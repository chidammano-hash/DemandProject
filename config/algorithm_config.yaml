cluster_sizing:
  # Minimum samples per feature before the 80/20 split inflation.
  # The effective minimum cluster rows = max(floor, n_features * samples_per_feature * 1.25).
  # With 62 features and spf=2 → min_cluster_rows = 155 (balanced threshold).
  samples_per_feature: 1

backtest:
  n_timeframes: 10
  output_dir: data/backtest
  # Early stopping patience as % of max iterations (standardized across all models)
  early_stop_pct: 0.03
  # SHAP retrain threshold: retrain if >= this fraction of features are dropped
  shap_retrain_threshold: 0.10
  # Embargo gap (months) between train_end and predict_start.
  # Matches gap_months in tuning CV splits to prevent train/predict leakage.
  embargo_months: 0
  # Number of random seeds for multi-seed variance estimation (default 1 = single run)
  n_seeds: 1
  # Tweedie objective routing for intermittent demand clusters
  tweedie_variance_power: 1.5
  intermittent_threshold: 0.7
  lumpy_threshold: 0.3

# ── Recursive noise injection (teacher forcing lite) ─────────────────────
# Adds Gaussian noise to lag features during training when recursive mode
# is enabled, making models robust to the distribution shift between
# training (real actuals as lags) and inference (model predictions as lags).
# Disabled by default for backward compatibility.
recursive_noise_enabled: false
recursive_noise_pct: 0.05      # std dev of noise as fraction of mean |qty|

# Canonical ↔ native parameter name mapping reference:
#   canonical        | lgbm              | catboost           | xgboost
#   estimators       | n_estimators      | iterations         | n_estimators
#   max_depth        | max_depth         | depth              | max_depth
#   l2_reg           | reg_lambda        | l2_leaf_reg        | reg_lambda
#   l1_reg           | reg_alpha         | (not supported)    | reg_alpha
#   min_leaf_samples | min_child_samples | min_data_in_leaf   | min_child_weight
#   col_sample       | colsample_bytree  | colsample_bylevel  | colsample_bytree
# Config uses native names per library; model_registry.py maps to canonical.

algorithms:
  lgbm:
    enabled: true
    model_id: lgbm_cluster
    cluster_strategy: per_cluster
    recursive: true
    shap_select: true
    shap_threshold: 0.95
    shap_top_n: null
    shap_sample_size: 500
    tune_inline: false
    params_file: null
    n_estimators: 1500
    learning_rate: 0.02
    num_leaves: 127
    min_child_samples: 40
    max_depth: -1
    min_gain_to_split: 0.005
    subsample: 0.8
    bagging_freq: 1
    colsample_bytree: 0.8
    feature_fraction_bynode: 0.7
    reg_lambda: 1.0
    reg_alpha: 0.1
    path_smooth: 4
    max_bin: 127
  catboost:
    enabled: true
    model_id: catboost_cluster
    cluster_strategy: per_cluster
    recursive: true
    shap_select: true
    shap_threshold: 0.95
    shap_top_n: null
    shap_sample_size: 500
    tune_inline: false
    params_file: null
    iterations: 3000
    learning_rate: 0.008
    depth: 10
    l2_leaf_reg: 7.5
    subsample: 0.85
    grow_policy: Lossguide
    border_count: 64
    random_strength: 0.5
    min_data_in_leaf: 28
    colsample_bylevel: 0.85
    bagging_temperature: 0.4
    max_leaves: 127
    bootstrap_type: MVS
    model_size_reg: 0.08
    score_function: L2
    boost_from_average: true
    leaf_estimation_method: Newton
    leaf_estimation_iterations: 10
    max_ctr_complexity: 1
  xgboost:
    enabled: true
    model_id: xgboost_cluster
    cluster_strategy: per_cluster
    recursive: true
    shap_select: true
    shap_threshold: 0.95
    shap_top_n: null
    shap_sample_size: 500
    tune_inline: false
    params_file: null
    n_estimators: 2000
    learning_rate: 0.02
    max_depth: 6
    min_child_weight: 15
    subsample: 0.8
    colsample_bytree: 0.8
    grow_policy: lossguide
    max_leaves: 127
    max_bin: 256
    reg_lambda: 1.0
    reg_alpha: 0.1
    gamma: 0.005
    colsample_bylevel: 0.8
    booster: gbtree
  seasonal_naive:
    enabled: true
    model_id: seasonal_naive
    cluster_strategy: per_cluster
  rolling_mean:
    enabled: true
    model_id: rolling_mean
    cluster_strategy: per_cluster
    window: 6
