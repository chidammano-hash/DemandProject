# data_quality_config.yaml
# Data quality check definitions by domain (Spec 08-01)

schedule:
  cron: "0 */4 * * *"          # Run every 4 hours
  on_load: true                 # Also run after each data load

global_defaults:
  severity: warning
  enabled: true

checks:
  # ── Completeness checks (null % on critical columns) ──────────
  completeness:
    item:
      table: dim_item
      columns:
        - column: item_id
          null_pct_threshold: 0.0
          severity: critical
        - column: item_desc
          null_pct_threshold: 5.0
          severity: warning
        - column: brand_name
          null_pct_threshold: 10.0
          severity: warning
        - column: category
          null_pct_threshold: 10.0
          severity: warning
    location:
      table: dim_location
      columns:
        - column: location_id
          null_pct_threshold: 0.0
          severity: critical
        - column: state_id
          null_pct_threshold: 5.0
          severity: warning
    customer:
      table: dim_customer
      columns:
        - column: customer_no
          null_pct_threshold: 0.0
          severity: critical
    sku:
      table: dim_sku
      columns:
        - column: item_id
          null_pct_threshold: 0.0
          severity: critical
        - column: loc
          null_pct_threshold: 0.0
          severity: critical
        - column: cluster_assignment
          null_pct_threshold: 20.0
          severity: warning
    sales:
      table: fact_sales_monthly
      columns:
        - column: item_id
          null_pct_threshold: 0.0
          severity: critical
        - column: qty
          null_pct_threshold: 0.0
          severity: critical
        - column: startdate
          null_pct_threshold: 0.0
          severity: critical
    forecast:
      table: fact_external_forecast_monthly
      columns:
        - column: item_id
          null_pct_threshold: 0.0
          severity: critical
        - column: loc
          null_pct_threshold: 0.0
          severity: critical
        - column: basefcst_pref
          null_pct_threshold: 0.0
          severity: critical
    inventory:
      table: fact_inventory_snapshot
      columns:
        - column: item_id
          null_pct_threshold: 0.0
          severity: critical
        - column: loc
          null_pct_threshold: 0.0
          severity: critical
        - column: qty_on_hand
          null_pct_threshold: 1.0
          severity: warning
        - column: snapshot_date
          null_pct_threshold: 0.0
          severity: critical
    sourcing:
      table: dim_sourcing
      columns:
        - column: item_id
          null_pct_threshold: 0.0
          severity: critical
        - column: loc
          null_pct_threshold: 0.0
          severity: critical
        - column: source_cd
          null_pct_threshold: 0.0
          severity: critical
        - column: supplier_id
          null_pct_threshold: 1.0
          severity: warning
    purchase_order:
      table: fact_purchase_orders
      columns:
        - column: po_number
          null_pct_threshold: 0.0
          severity: critical
        - column: item_id
          null_pct_threshold: 0.0
          severity: critical
        - column: loc
          null_pct_threshold: 0.0
          severity: critical
        - column: ordered_qty
          null_pct_threshold: 1.0
          severity: warning
        - column: delivery_date
          null_pct_threshold: 5.0
          severity: warning

  # ── Uniqueness checks (duplicate detection on key columns) ────
  uniqueness:
    item:
      table: dim_item
      key_columns: ["item_id"]
      severity: critical
    location:
      table: dim_location
      key_columns: ["location_id"]
      severity: critical
    customer:
      table: dim_customer
      key_columns: ["site", "customer_no"]
      severity: critical
    sku:
      table: dim_sku
      key_columns: ["item_id", "loc"]
      severity: critical
    sales:
      table: fact_sales_monthly
      key_columns: ["item_id", "customer_group", "loc", "startdate", "type"]
      severity: warning
    forecast:
      table: fact_external_forecast_monthly
      key_columns: ["forecast_ck", "model_id"]
      severity: critical
    inventory:
      table: fact_inventory_snapshot
      key_columns: ["item_id", "loc", "snapshot_date"]
      severity: warning
    sourcing:
      table: dim_sourcing
      key_columns: ["item_id", "loc", "source_cd"]
      severity: critical
    purchase_order:
      table: fact_purchase_orders
      key_columns: ["po_number", "item_id", "loc"]
      severity: critical

  # ── Range checks (min/max bounds for qty fields) ──────────────
  range:
    sales:
      table: fact_sales_monthly
      columns:
        - column: qty
          min: 0
          max: 10000000
          severity: warning
        - column: qty_shipped
          min: 0
          max: 10000000
          severity: warning
    forecast:
      table: fact_external_forecast_monthly
      columns:
        - column: basefcst_pref
          min: -1000000
          max: 100000000
          severity: warning
    inventory:
      table: fact_inventory_snapshot
      columns:
        - column: qty_on_hand
          min: -100000
          max: 100000000
          severity: warning
        - column: qty_on_order
          min: 0
          max: 100000000
          severity: warning
        - column: lead_time_days
          min: 0
          max: 730
          severity: warning
    purchase_order:
      table: fact_purchase_orders
      columns:
        - column: ordered_qty
          min: 0
          max: 100000000
          severity: warning
        - column: net_price
          min: 0
          max: 1000000
          severity: warning
        - column: gross_value
          min: 0
          max: 100000000
          severity: warning

  # ── Volume delta checks (max % change between loads) ──────────
  volume_delta:
    sales:
      table: fact_sales_monthly
      max_pct_change: 50.0
      severity: warning
    forecast:
      table: fact_external_forecast_monthly
      max_pct_change: 50.0
      severity: warning
    inventory:
      table: fact_inventory_snapshot
      max_pct_change: 30.0
      severity: warning
    item:
      table: dim_item
      max_pct_change: 20.0
      severity: info
    location:
      table: dim_location
      max_pct_change: 20.0
      severity: info
    sku:
      table: dim_sku
      max_pct_change: 25.0
      severity: warning
    sourcing:
      table: dim_sourcing
      max_pct_change: 20.0
      severity: warning
    purchase_order:
      table: fact_purchase_orders
      max_pct_change: 30.0
      severity: warning

  # ── Referential integrity checks (FK relationships) ───────────
  referential_integrity:
    sales_to_sku:
      source_table: fact_sales_monthly
      source_columns: ["item_id", "loc"]
      target_table: dim_sku
      target_columns: ["item_id", "loc"]
      severity: warning
    forecast_to_sku:
      source_table: fact_external_forecast_monthly
      source_columns: ["item_id", "loc"]
      target_table: dim_sku
      target_columns: ["item_id", "loc"]
      severity: warning
    inventory_to_item:
      source_table: fact_inventory_snapshot
      source_columns: ["item_id"]
      target_table: dim_item
      target_columns: ["item_id"]
      severity: warning
    inventory_to_location:
      source_table: fact_inventory_snapshot
      source_columns: ["loc"]
      target_table: dim_location
      target_columns: ["location_id"]
      severity: warning
    sku_to_item:
      source_table: dim_sku
      source_columns: ["item_id"]
      target_table: dim_item
      target_columns: ["item_id"]
      severity: info
    sku_to_location:
      source_table: dim_sku
      source_columns: ["loc"]
      target_table: dim_location
      target_columns: ["location_id"]
      severity: info
    sales_to_time:
      source_table: fact_sales_monthly
      source_columns: ["startdate"]
      target_table: dim_time
      target_columns: ["date_key"]
      severity: info
    sourcing_to_item:
      source_table: dim_sourcing
      source_columns: ["item_id"]
      target_table: dim_item
      target_columns: ["item_id"]
      severity: warning
    sourcing_to_location:
      source_table: dim_sourcing
      source_columns: ["loc"]
      target_table: dim_location
      target_columns: ["location_id"]
      severity: warning
    po_to_item:
      source_table: fact_purchase_orders
      source_columns: ["item_id"]
      target_table: dim_item
      target_columns: ["item_id"]
      severity: warning
    po_to_location:
      source_table: fact_purchase_orders
      source_columns: ["loc"]
      target_table: dim_location
      target_columns: ["location_id"]
      severity: warning

  # ── Distribution drift between load batches ──────────────────
  distribution_drift:
    sales:
      table: fact_sales_monthly
      columns:
        - column: qty
          max_drift: 0.15
          severity: warning
    forecast:
      table: fact_external_forecast_monthly
      columns:
        - column: basefcst_pref
          max_drift: 0.20
          severity: warning
    inventory:
      table: fact_inventory_snapshot
      columns:
        - column: qty_on_hand
          max_drift: 0.15
          severity: warning
        - column: lead_time_days
          max_drift: 0.20
          severity: warning

  # ── Temporal gap detection (missing months) ──────────────────
  temporal_gaps:
    sales:
      table: fact_sales_monthly
      date_column: startdate
      grain: month
      severity: warning
    forecast:
      table: fact_external_forecast_monthly
      date_column: startdate
      grain: month
      severity: warning

  # ── Cross-column logical consistency ─────────────────────────
  cross_column:
    sales:
      table: fact_sales_monthly
      rules:
        - name: qty_non_negative
          expression: "qty >= 0"
          description: "Sales quantity must be non-negative"
          severity: warning
        - name: shipped_lte_ordered
          expression: "qty_shipped <= qty_ordered OR qty_ordered IS NULL OR qty_shipped IS NULL"
          description: "Shipped qty should not exceed ordered qty"
          severity: info
    inventory:
      table: fact_inventory_snapshot
      rules:
        - name: on_order_non_negative
          expression: "qty_on_order >= 0 OR qty_on_order IS NULL"
          description: "On-order quantity must be non-negative"
          severity: warning
        - name: lead_time_positive
          expression: "lead_time_days >= 0 OR lead_time_days IS NULL"
          description: "Lead time must be non-negative"
          severity: critical
        - name: snapshot_date_not_future
          expression: "snapshot_date <= '2026-02-24'"
          description: "Snapshot date should not be after planning date"
          severity: warning
    purchase_order:
      table: fact_purchase_orders
      rules:
        - name: ordered_qty_positive
          expression: "ordered_qty > 0 OR ordered_qty IS NULL"
          description: "Ordered quantity must be positive"
          severity: warning
        - name: delivery_after_ship
          expression: "delivery_date >= original_ship_date OR delivery_date IS NULL OR original_ship_date IS NULL"
          description: "Delivery date should be on or after ship date"
          severity: warning

  # ── Cardinality anomaly (unexpected distinct value changes) ──
  cardinality_anomaly:
    item:
      table: dim_item
      columns:
        - column: category
          max_change_pct: 15.0
          severity: warning
        - column: brand_name
          max_change_pct: 10.0
          severity: warning
    sku:
      table: dim_sku
      columns:
        - column: cluster_assignment
          max_change_pct: 20.0
          severity: info
    inventory:
      table: fact_inventory_snapshot
      columns:
        - column: loc
          max_change_pct: 10.0
          severity: warning

