# LGBM Tuning — run tracking and comparison configuration
lgbm_tuning:
  # Directory for archived tuning run backups
  backup_dir: data/backtest/tuning_archive

  # Auto-register runs when run_backtest.py completes
  auto_register: true

  # Auto-compare new runs against the most recent completed run
  auto_compare_to_latest: true

  # Minimum accuracy improvement (basis points) to mark as "improved"
  improvement_threshold_bps: 5

  # Verdict thresholds
  verdicts:
    improved_min_delta_accuracy: 0.05   # +0.05% accuracy = improved
    degraded_max_delta_accuracy: -0.05  # -0.05% accuracy = degraded

  # Model to track (extensible to other models later)
  tracked_models:
    - lgbm_cluster

  # Max runs to keep in archive (0 = unlimited)
  max_archive_runs: 50
