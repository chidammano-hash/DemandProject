# ═══ EXTERNAL ML FORECAST LOADING CONFIG ═══
# Loads externally-generated ML predictions into the backtest pipeline (Spec 02-17)
# Used by: scripts/etl/load_ext_ml_forecasts.py
# Source: data/input/df_ml_*.csv
# Destination: fact_external_forecast_monthly (lag-0 only) + backtest_lag_archive (all lags)

# ═══ MODEL REGISTRY ═══
# Each key is a model_id used in backtest_lag_archive and fact_external_forecast_monthly
models:
  ext_lgbm:                              # External LightGBM model
    input_file: data/input/df_ml_lgbm_l2_extract.csv  # CSV path relative to project root
    description: External LightGBM predictions with all lags 0-4
  ext_cat:                               # External CatBoost model
    input_file: data/input/df_ml_cat_l2_extract.csv    # CSV path relative to project root
    description: External CatBoost predictions with all lags 0-4
  ext_xg:                                # External XGBoost model
    input_file: data/input/df_ml_xg_l2_extract.csv     # CSV path relative to project root
    description: External XGBoost predictions with all lags 0-4
  ext_best:                              # External best-model ensemble (per-DFU champion pick)
    input_file: data/input/df_ml_best.csv              # CSV path relative to project root
    description: External best-model ensemble predictions with all lags 0-4

# ═══ LOADING SETTINGS ═══
# Batch size for DB inserts (rows per batch); large value for bulk COPY performance
batch_size: 2000000                      # Rows per execute_values batch; tune based on available memory

# Timeframe label written to backtest_lag_archive.timeframe column
# null = no label (external forecasts have no timeframe segmentation)
timeframe: null                          # Options: null, or a string like "12m", "24m"

# ═══ LAG RANGE ═══
# Execution lag range to accept from input CSV (0 = forecast made at month start, 4 = 4 months ahead)
min_lag: 0                               # Minimum lag to load (inclusive)
max_lag: 4                               # Maximum lag to load (inclusive); rows outside this range are dropped
