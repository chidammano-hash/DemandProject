# Forecast Domain Configuration — consolidated from:
#   seasonality_config.yaml, variability_config.yaml, bias_correction_config.yaml

seasonality:
  # Minimum months of non-zero history required
  min_months_history: 24

  # Seasonality strength thresholds (CV of monthly means)
  thresholds:
    low: 0.15          # Below this -> profile = 'none'
    medium: 0.35        # Between low and medium with confirmation -> 'medium'
    high: 0.70          # Above this with confirmation -> 'high'

  # Confirmation gates (at least one must pass for medium/high)
  confirmation:
    yoy_correlation: 0.40     # Year-over-year Pearson correlation
    acf_lag12: 0.30           # Autocorrelation at lag 12

  # Peak-trough ratio minimum for is_yearly_seasonal flag
  peak_trough_min_ratio: 1.3

  # Output
  output_path: "data/staged/seasonality_results.csv"

variability:
  # IPfeature1: Demand Variability & Statistical Profiling Engine
  # All configurable thresholds and parameters live here.

  history:
    # Rolling window in months for variability computation
    history_months: 24
    # Minimum months of history required to compute stats
    min_months_history: 6

  outlier:
    # Winsorize outliers beyond mean ± N * std
    sigma_threshold: 3

  cv_thresholds:
    # Coefficient of variation class boundaries
    # CV < low      → 'low'
    # low <= CV < medium → 'medium'
    # medium <= CV < high → 'high'
    # CV >= high OR intermittency > intermittency_threshold → 'lumpy'
    low: 0.30
    medium: 0.80
    high: 1.50

  intermittency_threshold:
    # Fraction of zero-demand months that triggers 'lumpy' regardless of CV
    ratio: 0.30

bias_correction:
  # Rolling window weights (most-recent first, must sum to 1.0)
  rolling_weights: [0.50, 0.30, 0.20]

  # Minimum months of data required for SKU-level correction
  min_months_sku: 3
  min_months_segment: 2

  # Activation threshold: only apply correction if |bias| >= this
  min_bias_threshold: 0.05

  # Guard rails: correction factor clipped to [min, max]
  correction_factor_min: 0.70
  correction_factor_max: 1.30

  # Flag for human review when raw correction exceeds this
  review_threshold: 0.20

  # Segment precedence (highest specificity first)
  segment_priority:
    - sku
    - cluster
    - abc_seasonality

  # History window for bias computation (months back from plan_run_date)
  lookback_months: 3

  scheduler:
    job_type: compute_bias_corrections
    cron: "0 3 1 * *"       # Monthly, 3am on the 1st
