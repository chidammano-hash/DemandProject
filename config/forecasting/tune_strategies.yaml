# Unified tune strategies — per-model auto-tune strategy overrides.
# LightGBM automatic tuning strategies.
#
# Each strategy is a named set of overrides applied on top of the base
# forecast_pipeline_config.yaml `algorithms.<model>` section.  Only the keys
# that differ from the current production config need to be specified —
# everything else is inherited.
#
# Usage:
#   make lgbm-auto-tune RUNS=5          # run first 5 LGBM strategies
#   make lgbm-auto-tune RUNS=10         # run all LGBM strategies
#
# After all runs complete the script prints a leaderboard and optionally
# promotes the best run's params into forecast_pipeline_config.yaml.
#
# Consumed by: scripts/ml/auto_tune.py (load_strategies -> apply_overrides)
# Each strategy generates a temp forecast_pipeline_config.yaml, runs a
# backtest, registers the run, and the best is optionally promoted.

lgbm:
  strategies:                               # LightGBM hyperparameter strategies list

    - label: "higher_lr_0.05"               # Unique identifier shown in leaderboard
      description: "Faster learning rate — quicker convergence, risk of overshoot"
      overrides:                            # Keys override algorithms.lgbm_cluster.params in forecast_pipeline_config.yaml
        learning_rate: 0.05                 # Step size shrinkage per boosting round (higher = faster convergence, more overshoot)

    - label: "lower_lr_0.01"
      description: "Slower learning rate — more precise splits, needs more trees"
      overrides:
        learning_rate: 0.01                 # Very small step size — needs many more trees to converge
        n_estimators: 2500                  # Max boosting rounds (early stopping may terminate sooner)

    - label: "deep_trees"
      description: "Deeper trees with more leaves — captures complex interactions"
      overrides:
        max_depth: 14                       # Maximum tree depth — deeper trees model more complex interactions
        num_leaves: 127                     # Max number of leaves per tree (should be <= 2^max_depth - 1)

    - label: "shallow_trees"
      description: "Shallow, wide trees — faster training, less overfitting"
      overrides:
        max_depth: 6                        # Shallow depth limits model complexity
        num_leaves: 31                      # Fewer leaves = simpler, faster trees
        n_estimators: 2000                  # More trees compensate for reduced per-tree capacity

    - label: "heavy_regularization"
      description: "Strong L2 + higher min_child_samples — combats overfitting"
      overrides:
        reg_lambda: 5.0                     # L2 regularization term on leaf weights (higher = stronger penalty)
        min_child_samples: 50               # Min data points per leaf — prevents splits on sparse data
        subsample: 0.70                     # Row sampling ratio per tree (0.70 = use 70% of rows)

    - label: "light_regularization"
      description: "Minimal regularization — let the trees fit freely"
      overrides:
        reg_lambda: 0.1                     # Very light L2 penalty
        subsample: 0.95                     # Near-full row sampling
        colsample_bytree: 0.95             # Column sampling ratio per tree (0.95 = use 95% of features)

    - label: "aggressive_subsample"
      description: "Heavy row + column dropout — maximum stochastic regularization"
      overrides:
        subsample: 0.60                     # Use only 60% of rows per tree (strong stochastic regularization)
        colsample_bytree: 0.60             # Use only 60% of features per tree

    - label: "more_trees_slow_lr"
      description: "2500 trees at LR 0.015 — slow and steady"
      overrides:
        n_estimators: 2500                  # Large tree budget for gradual refinement
        learning_rate: 0.015                # Slow learning rate for fine-grained convergence

    - label: "balanced_mid"
      description: "Balanced middle ground — moderate depth, moderate regularization"
      overrides:
        learning_rate: 0.03                 # Moderate step size
        max_depth: 8                        # Mid-range tree depth
        num_leaves: 63                      # Moderate leaf count (~2^6 - 1)
        subsample: 0.75                     # 75% row sampling
        colsample_bytree: 0.75             # 75% column sampling
        reg_lambda: 2.0                     # Moderate L2 penalty

    - label: "fast_aggressive"
      description: "High LR, fewer trees, deep — fast convergence for rapid iteration"
      overrides:
        learning_rate: 0.08                 # High step size — converges fast, good for quick experiments
        n_estimators: 800                   # Fewer trees needed at high LR
        max_depth: 12                       # Deep trees for high expressiveness
        num_leaves: 127                     # Many leaves per tree

    - label: "sparse_demand_campaign"
      description: "Optimize params for intermittent/sparse DFUs — targets clusters with >50% zero demand"
      overrides:
        num_leaves: 15                      # Very few leaves — simpler splits for sparse data
        min_child_samples: 200              # High threshold prevents overfitting on rare non-zero demand
        reg_alpha: 1.0                      # L1 regularization — encourages sparsity in leaf weights
        path_smooth: 10                     # Smoothing factor for leaf value estimation (reduces variance)

    - label: "seasonal_boost_campaign"
      description: "Enhance seasonal pattern capture with deeper trees and more features retained"
      overrides:
        num_leaves: 127                     # Many leaves to capture seasonal patterns
        colsample_bytree: 0.95             # Retain nearly all features (seasonal features are important)
        feature_fraction_bynode: 0.85       # Per-split feature sampling (LightGBM-specific — samples features at each node)
        min_gain_to_split: 0.005            # Very low split gain threshold — allows subtle seasonal splits

    - label: "regularization_heavy"
      description: "Combat overfitting on small/noisy clusters with aggressive regularization"
      overrides:
        reg_alpha: 1.0                      # L1 regularization on leaf weights
        reg_lambda: 5.0                     # L2 regularization on leaf weights
        path_smooth: 10                     # Leaf value smoothing (higher = more regularization)
        min_child_samples: 100              # High min samples per leaf
        min_gain_to_split: 0.05             # Prune splits with low information gain
