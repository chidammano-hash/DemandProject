# ═══ CONSENSUS CONFIG ═══
# Demand consensus process: planner overrides, approval workflow, plan generation (Spec F2.3)
# Used by: api/routers/consensus_plan.py (validation), scripts/generate_consensus_plan.py (plan merge)
# Output: fact_forecast_overrides, fact_consensus_plan

consensus_plan:
  # ═══ APPROVAL THRESHOLDS ═══
  # Any override exceeding ANY of these triggers mandatory approval workflow
  approval_required_threshold_units: 100     # Overrides > 100 units require approval
  approval_required_threshold_pct: 0.20      # Or > 20% uplift vs. statistical baseline requires approval (0.20 = 20%)
  approval_required_threshold_value: 5000    # Or > $5,000 estimated financial impact requires approval (USD)

  # ═══ OVERRIDE TYPES ═══
  # Allowed override type codes; submitted overrides must use one of these
  valid_override_types:
    - PROMO                              # Promotional event uplift
    - LAUNCH                             # New product launch
    - PHASE_OUT                          # Product end-of-life reduction
    - MARKET_EVENT                       # External market event (competitor exit, regulation, etc.)
    - CAPACITY_LOCK                      # Supply-side constraint (fixed ceiling)
    - MANUAL                             # Planner judgment override (catch-all)

  # ═══ MULTIPLIER BOUNDS ═══
  # Guard rails on override multiplier values to prevent data entry errors
  multiplier_bounds:
    min: 0.10                            # Floor: override cannot reduce base by more than 90%
    max: 5.00                            # Ceiling: override cannot multiply base by more than 5x

  # ═══ CONFLICT RESOLUTION ═══
  # When multiple overrides target the same DFU+month, highest-priority type wins
  conflict_resolution:
    priority_order:                      # Ordered highest to lowest priority
      - CAPACITY_LOCK                    # Priority 1 — supply constraint always wins
      - PROMO                            # Priority 2 — promotional commitments
      - LAUNCH                           # Priority 2 — new product launches
      - PHASE_OUT                        # Priority 3 — end-of-life phase-outs
      - MARKET_EVENT                     # Priority 3 — external market events
      - MANUAL                           # Priority 4 — manual planner overrides (lowest)
    log_all_conflicts: true              # Log every detected conflict to audit trail even if auto-resolved

  # ═══ AUTO EXPIRY ═══
  # Automatically expire unconfirmed overrides after their effective period ends
  auto_expiry:
    enabled: true                        # Enable automatic expiry of past-due overrides
    status_on_expiry: expired            # Status set on expired overrides; options: 'expired', 'archived' (never deleted)

  # ═══ CONSENSUS PLAN OUTPUT ═══
  # Controls how the merged consensus plan is generated from baseline + overrides
  consensus_plan_output:
    adjust_p10_p90_proportionally: true  # Scale P10/P90 quantiles by same ratio as P50 override
    floor_qty: 0                         # Minimum consensus qty (prevents negative forecast values)
    ceiling_multiplier: 5.0              # Maximum effective multiplier vs. statistical baseline

  # ═══ NOTIFICATIONS ═══
  # Notification triggers for the override approval workflow
  notifications:
    notify_on_submission: true           # Notify approvers when a new override is submitted
    notify_on_approval: true             # Notify submitter when their override is approved
    notify_on_rejection: true            # Notify submitter when their override is rejected
    approver_roles:                      # Roles that receive approval request notifications
      - demand_manager                   # Primary approver role
      - supply_chain_director            # Secondary/escalation approver role
