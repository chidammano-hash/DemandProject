# Named JobManager pipeline presets — the forecasting lifecycle as chained jobs.
#
# Consumed by: common/services/pipeline_presets.py
# Launched via: POST /jobs/pipelines/named/{name}   (list: GET /jobs/pipelines/named)
#
# Each step is {job_type, params?, label?}; job_type must exist in
# JOB_TYPE_REGISTRY (common/services/job_registry.py). Steps run sequentially
# through JobManager.submit_pipeline — a failed step stops the pipeline.
# tests/unit/test_pipeline_presets.py verifies every step's job_type is registered.
pipelines:
  data-refresh:
    description: >-
      Detect changed source files, reload the deltas, recompute SKU features,
      then refresh every materialized view (heavy intramonth MV excluded —
      the nightly safety net covers it).
    steps:
      - job_type: etl_pipeline
        params: {mode: refresh, parallel: true}
      - job_type: compute_sku_features
      - job_type: refresh_all_mvs
        params: {skip_heavy: true}

  model-refresh:
    description: >-
      Re-tune any stale per-cluster profiles, re-run the three tree backtests
      (each auto-loads its predictions on success), then champion selection.
      Run after data-refresh or after promoting a new clustering scenario.
    steps:
      - job_type: tune_stale_clusters
        params: {model: lgbm}
      - job_type: backtest_lgbm
      - job_type: backtest_catboost
      - job_type: backtest_xgboost
      - job_type: champion_select

  forecast-publish:
    description: >-
      Train the production tree models on full history, then generate
      champion-routed forecasts into fact_production_forecast_staging.
      Review, then promote via POST /backtest-management/champion/promote
      (promotion refreshes the production MVs).
    steps:
      - job_type: archive_forecast_snapshot
      - job_type: train_production_model
        params: {all_models: true}
      - job_type: generate_production_forecast
      - job_type: prepare_forecast_snapshot_contenders

  forecast-snapshot-bundle:
    description: >-
      Freeze the top three non-champion contenders, archive the champion-plus-three
      six-lag snapshot, then clean only staging generations that pass reconciliation.
      The cleanup step targets generations older than the planning month; use the
      standalone cleanup job for an explicit generation override.
    steps:
      - job_type: prepare_forecast_snapshot_contenders
      - job_type: archive_forecast_snapshot
      - job_type: cleanup_forecast_staging

  full-refresh:
    description: >-
      The whole lifecycle end-to-end: data refresh, feature recompute,
      stale-cluster re-tune, backtests, champion selection, production
      training and staging generation. Promotion stays a manual review step.
    steps:
      - job_type: archive_forecast_snapshot
      - job_type: etl_pipeline
        params: {mode: refresh, parallel: true}
      - job_type: compute_sku_features
      - job_type: tune_stale_clusters
        params: {model: lgbm}
      - job_type: backtest_lgbm
      - job_type: backtest_catboost
      - job_type: backtest_xgboost
      - job_type: champion_select
      - job_type: train_production_model
        params: {all_models: true}
      - job_type: generate_production_forecast
      - job_type: prepare_forecast_snapshot_contenders
      - job_type: refresh_all_mvs
        params: {skip_heavy: true}
