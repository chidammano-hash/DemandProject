# Named JobManager pipeline presets — the forecasting lifecycle as chained jobs.
#
# Consumed by: common/services/pipeline_presets.py
# Launched via: POST /jobs/pipelines/named/{name}   (list: GET /jobs/pipelines/named)
#
# Each step is {job_type, params?, label?}; job_type must exist in
# JOB_TYPE_REGISTRY (common/services/job_registry.py). Steps run sequentially
# through JobManager.submit_pipeline — a failed step stops the pipeline.
# tests/unit/test_pipeline_presets.py verifies every step's job_type is registered.
job_timeouts_seconds:
  default: 7200              # Generic managed subprocess ceiling (2 hours).
  chronos2_enriched: 28800  # Foundation backtest is documented at ~6h; allow 8h.
  production_training: 28800   # Three persisted final fits run in one all-or-fail step.
  production_generation: 28800 # Full champion inference can include Chronos routes.
  snapshot_contenders: 28800   # Three six-lag contender generations may run serially.
  stale_cluster_tuning: 28800  # Up to 50 trials x 5 folds across stale clusters.

pipelines:
  clustering-refresh:
    description: >-
      Recompute SKU features, run the unified clustering pipeline, label the
      resulting segments, and automatically promote the completed clustering
      experiment for downstream model training.
    steps:
      - job_type: compute_sku_features
        params: {time_window_months: 36}
      - job_type: cluster_pipeline
        params: {auto_promote: true}

  data-refresh:
    description: >-
      Detect changed source files, reload the deltas, recompute SKU features,
      then refresh every materialized view (heavy intramonth MV excluded —
      the nightly safety net covers it).
    steps:
      - job_type: etl_pipeline
        params: {mode: refresh, parallel: true}
      - job_type: compute_sku_features
      - job_type: refresh_all_mvs
        params: {skip_heavy: true}

  model-refresh:
    description: >-
      Re-tune stale LightGBM cluster profiles, run the complete five-model
      backtest roster, and load current governed evidence for each model.
      Run after data-refresh or after promoting a new clustering scenario.
    steps:
      - job_type: tune_stale_clusters
        params: {model: lgbm}
      - job_type: backtest_lgbm
        params: {governed: true}
      - job_type: backtest_nhits
        params: {governed: true}
      - job_type: backtest_nbeats
        params: {governed: true}
      - job_type: backtest_mstl
        params: {governed: true}
      - job_type: backtest_chronos2_enriched
        params: {governed: true}

  champion-refresh:
    description: >-
      Select the champion from the current governed five-model evidence, then
      atomically assign the completed champion experiment using the current
      production strategy. The incumbent remains active unless the entire
      assignment succeeds.
    steps:
      - job_type: governed_champion_refresh

  forecast-publish:
    description: >-
      Final-refit LightGBM, N-HiTS, and N-BEATS on full history, then generate
      one immutable champion release candidate. Review the returned source_run_id,
      stage that exact run, then promote it to replace the sole active production
      release. Snapshot preparation and archival run independently in period-roll.
    steps:
      - job_type: train_production_model
        params: {all_models: true}
      - job_type: generate_production_forecast

  forecast-snapshot-bundle:
    description: >-
      Freeze the top three non-champion contenders, archive the champion-plus-three
      six-lag snapshot, then clean only staging generations that pass reconciliation.
      The cleanup step targets generations older than the planning month; use the
      standalone cleanup job for an explicit generation override.
    steps:
      - job_type: prepare_forecast_snapshot_contenders
      - job_type: archive_forecast_snapshot
      - job_type: cleanup_forecast_staging
        params: {dry_run: false}

  period-roll:
    description: >-
      Beginning-of-month control: score any newly closed lags from actuals,
      prepare and archive the current planning month's champion-plus-three
      snapshot, then remove only staging generations that reconcile to an
      immutable archive. Safe to retry for an already archived planning month.
    steps:
      - job_type: refresh_forecast_snapshot_kpis
        label: Calculate Prior-Month Snapshot KPIs
      - job_type: prepare_forecast_snapshot_contenders
        label: Prepare Current-Month Snapshot
      - job_type: archive_forecast_snapshot
        label: Archive Current-Month Snapshot
      - job_type: cleanup_forecast_staging
        label: Clean Reconciled Forecast Staging
        params: {dry_run: false}

  inventory-refresh:
    description: >-
      Recompute safety stock, EOQ, replenishment plans, policies, health scores,
      and planning exceptions from the current promoted forecast.
    steps:
      - job_type: compute_safety_stock
      - job_type: compute_eoq
      - job_type: compute_replenishment_plan
      - job_type: assign_policies
      - job_type: refresh_health_scores
      - job_type: generate_exceptions

  full-refresh:
    description: >-
      The whole lifecycle end-to-end: data refresh, feature recompute,
      promoted clustering, stale-cluster re-tune, five-model backtests,
      governed champion refresh, persisted final refits, and staging generation.
      Promotion stays a manual review step.
    steps:
      - job_type: etl_pipeline
        params: {mode: refresh, parallel: true}
      - job_type: compute_sku_features
      - job_type: cluster_pipeline
        params: {auto_promote: true}
      - job_type: tune_stale_clusters
        params: {model: lgbm}
      - job_type: backtest_lgbm
        params: {governed: true}
      - job_type: backtest_nhits
        params: {governed: true}
      - job_type: backtest_nbeats
        params: {governed: true}
      - job_type: backtest_mstl
        params: {governed: true}
      - job_type: backtest_chronos2_enriched
        params: {governed: true}
      - job_type: governed_champion_refresh
      - job_type: train_production_model
        params: {all_models: true}
      - job_type: generate_production_forecast
      - job_type: refresh_all_mvs
        params: {skip_heavy: true}
