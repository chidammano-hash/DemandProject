fm_spine:
  enabled: true
  model_id: chronos2_enriched
  quantiles:
  - 0.1
  - 0.5
  - 0.9
  collapse_tree_variants: false
algorithms:
  lgbm_cluster:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    cluster_strategy: per_cluster
    output_dir: data/backtest/lgbm_cluster
    params:
      recursive: true
      shap_select: true
      shap_threshold: 0.9
      shap_top_n: null
      shap_sample_size: 500
      correlation_filter: false
      correlation_threshold: 0.98
      variance_filter: false
      variance_threshold: 0.01
      tune_inline: false
      params_file: null
      objective: regression_l1
      n_estimators: 2000
      learning_rate: 0.015
      num_leaves: 63
      min_child_samples: 20
      max_depth: 8
      min_gain_to_split: 0.01
      subsample: 0.75
      bagging_freq: 1
      colsample_bytree: 0.8
      feature_fraction_bynode: 0.8
      reg_lambda: 0.8
      reg_alpha: 0.1
      path_smooth: 0.5
      max_bin: 255
      quantile_heads: []
  chronos2_enriched:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    output_dir: data/backtest/chronos2_enriched
    params:
      device: auto
      batch_size: 1024
      prediction_length: 6
      min_history: 3
      num_workers: 1
      model_name: amazon/chronos-2
      model_revision: 29ec3766d36d6f73f0696f85560a422f50e8498c
  mstl:
    type: statistical
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    output_dir: data/backtest/mstl
    params:
      season_length: 12
      min_history: 25
      num_workers: 8
  nbeats:
    type: deep_learning
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    output_dir: data/backtest/nbeats
    params:
      h: 6
      input_size: 24
      max_steps: 500
      batch_size: 32
      learning_rate: 0.001
      scaler_type: standard
      early_stop_patience_steps: -1
      min_history: 12
      random_seed: 42
      start_padding_enabled: true
      val_size: 0
      deterministic: true
  nhits:
    type: deep_learning
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    output_dir: data/backtest/nhits
    params:
      h: 6
      input_size: 24
      max_steps: 500
      batch_size: 32
      learning_rate: 0.001
      scaler_type: standard
      early_stop_patience_steps: -1
      min_history: 12
      random_seed: 42
      start_padding_enabled: true
      val_size: 0
      deterministic: true
backtest:
  n_timeframes: 10
  embargo_months: 0
  forecast_horizon: 6
  early_stop_pct: 0.05
  shap_retrain_threshold: 0.5
  shap_min_features: 20
  n_seeds: 1
  tweedie_variance_power: 1.5
  baseline_intermittent: false
  intermittent_threshold: 0.7
  lumpy_threshold: 0.3
  output_dir: data/backtest
  recursive_noise_enabled: true
  recursive_noise_pct: 0.05
  recursive_lag_smooth: 0.15
tuning:
  n_trials: 50
  n_splits: 5
  gap_months: 2
  val_months_per_fold: 3
  min_train_months: 13
  early_stopping_rounds: 50
  n_estimators_max: 2000
  n_estimators_buffer: 1.1
  random_seed: 42
  output_dir: data/tuning
  search_space_ref: hyperparameter_tuning.yaml
champion:
  strategy: per_segment
  strategy_params:
    segment_strategy_map:
      lumpy:
        top_k: 2
        strategy: ensemble
        weight_method: equal
        min_prior_months: 3
      smooth:
        top_k: 2
        strategy: ensemble
        weight_method: equal
        min_prior_months: 3
      erratic:
        top_k: 2
        strategy: ensemble
        weight_method: equal
        min_prior_months: 3
  fallback_model_id: lgbm_cluster
  metric: wape
  lag: execution
  min_sku_rows: 3
  min_dfu_rows: 3
  champion_model_id: champion
  promote_gate:
    enabled: true
    min_wape_improvement_pct: 1.0
    min_coverage_frac: 0.8
    bypass_token: null
  release_readiness:
    enabled: true
    require_external_benchmark: false  # Temporary exemption until the external feed includes the current closed month.
    lookback_months: 6
    min_relative_wape_lift_vs_naive_pct: 10.0
    min_accuracy_delta_vs_external_pct_points: 0.0
    max_abs_bias_pct: 5.0
    min_current_plan_coverage_frac: 0.95
    min_common_cohort_coverage_frac: 0.95
    min_common_cohort_closed_months: 6
    min_common_cohort_dfus: 1000
    min_common_cohort_actual_volume: 1.0
    min_confidence_interval_coverage_frac: 0.95
    require_current_cluster_lineage: true
    require_fresh_sales: true
    require_outgoing_archive: true
  meta_learner:
    model_type: random_forest
    n_estimators: 200
    max_depth: 15
    min_samples_leaf: 10
    class_weight: balanced
    random_state: 42
    n_jobs: -1
    test_months: 3
    performance_window: 6
  models:
  - chronos2_enriched
  - lgbm_cluster
  - mstl
  - nbeats
  - nhits
sweep:
  max_candidates: 24
  default_objective: robust
  default_mode: both
  default_segment_axis: demand_class
  robust_lambda: 0.5
  robust_mu: 0.25
  min_segment_dfus: 30
  parallel_default: false
production_forecast:
  horizon_months: 24
  lookback_months: 36
  min_history_months: 12
  cold_start_model_id: lgbm_cluster
  cold_start_min_months: 3
  fallback_model_id: lgbm_cluster
  recursive: true
  plan_version_format: '%Y-%m'
  keep_last_n_versions: 3
  production_training:
    enabled: true
    output_dir: data/models
    val_fraction: 0.2
    min_cluster_rows: 50
    save_metadata: true
  confidence_interval:
    enabled: true
    source_model_ids:
    - lgbm_cluster
    - chronos2_enriched
    - mstl
    - nbeats
    - nhits
    residual_lag: 0
    min_residual_months: 6
    z_lower: 1.282
    z_upper: 1.282
    horizon_scaling: sqrt
    sigma_floor: 1.0
    sigma_cap_multiplier: 3.0
  model_registry:
    base_path: data/models
  scheduler:
    job_type: generate_production_forecast
    cron: 0 6 2 * *
customer_forecast:
  enabled: true                    # Enable customer forecasts and governed bottom-up blending
  model_id: croston                # Customer forecasting uses Croston/SBA only
  model_params:
    alpha: 0.1                     # Smoothing factor for non-zero demand sizes and intervals
    variant: sba                   # Syntetos-Boylan bias-adjusted Croston forecast
  history_months: 18               # Fully closed monthly periods supplied as context
  horizon_months: 18               # Future monthly periods generated from the planning month
  recent_sales_lookback_months: 6  # Ignore customer-SKUs with no sales in the latest closed months
  batch_size: 10000                # Durable customer-SKU series per independently committed batch
  cpu_workers: 6                   # Parallel CPU workers for active Croston/SBA batches
  max_batch_attempts: 3            # Failed batch claims allowed before the run requires intervention
  progress_interval_seconds: 5     # Parent-process polling interval for exact series progress and ETA
  backtest:
    enabled: true
    lookback_months: 6
    min_train_months: 6
    horizon_months: 1
    batch_size: 10000
    promotion_thresholds:
      min_common_months: 6
      min_common_dfus: 1000
      max_wape_degradation_pct: 0.0
  bottom_up_blend:
    enabled: true
    model_id: customer_bottom_up_blend
    customer_weight: 0.5
    champion_weight: 0.5
    normalization:
      method: historical_fulfillment_ratio
      lookback_months: 18
      min_demand_qty: 1.0
      min_ratio: 0.0
      max_ratio: 1.0
    coverage:
      output_population: active_champion
      missing_customer: champion_fallback
      customer_only: exclude
    interval:
      method: champion_width_shift
    promotion:
      enabled: true
      reason: backtest_accuracy_gate
forecast_snapshot:
  lag_count: 6
  contender_count: 3
  rank_metric: wape
  active_window_months: 12
tracking:
  backup_dir: data/backtest/tuning_archive
  auto_register: true
  auto_compare_to_latest: true
  improvement_threshold_bps: 5
  verdicts:
    improved_min_delta_accuracy: 0.05
    degraded_max_delta_accuracy: -0.05
  max_archive_runs: 50
clustering:
  enabled: true
  cluster_sizing:
    samples_per_feature: 1
  config_ref: null
  tuning_profiles_ref: cluster_tuning_profiles.yaml
  experiment_templates_ref: cluster_experiment_templates.yaml
  steps:
    generate_features: true
    train_model: true
    label_clusters: true
    update_db: true
  artifacts:
    features_csv: data/staged/clustering_features.csv
    output_dir: data/clustering
  db_target:
    table: dim_sku
    column: ml_cluster
backtest_sampling:
  enabled: true
  default_target_n: 5000
  default_method: proportional
  min_per_cluster: 10
  max_target_n: 20000
  seed: 42
  representativeness_threshold: 0.05
pipeline:
  stages:
  - name: clustering
    description: Segment DFUs into demand-pattern clusters
    makefile_target: cluster-all
    depends_on: []
    enabled_by: clustering.enabled
  - name: backtest
    description: Expanding-window backtest for all enabled algorithms
    makefile_target: backtest-all
    depends_on:
    - clustering
    enabled_by: always
  - name: load
    description: Load backtest predictions into Postgres
    makefile_target: backtest-load-all-bulk
    depends_on:
    - backtest
    enabled_by: always
  - name: champion
    description: Select best model per DFU from backtest results
    makefile_target: champion-all
    depends_on:
    - load
    enabled_by: always
  - name: forecast
    description: Generate production forecasts using champion models
    makefile_target: forecast-generate
    depends_on:
    - champion
    enabled_by: always
  auxiliary:
  - name: seasonality
    description: Detect per-DFU seasonality profiles
    makefile_target: seasonality-all
  - name: variability
    description: Compute per-DFU demand variability class
    makefile_target: variability-all
