fm_spine:
  enabled: true
  model_id: chronos2_enriched
  quantiles:
  - 0.1
  - 0.5
  - 0.9
  collapse_tree_variants: false
algorithms:
  lgbm_cluster:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    output_dir: data/backtest/lgbm_cluster
    params:
      recursive: true
      shap_select: true
      shap_threshold: 0.9
      shap_top_n: null
      shap_sample_size: 500
      correlation_filter: false
      correlation_threshold: 0.98
      variance_filter: false
      variance_threshold: 0.01
      tune_inline: false
      params_file: null
      objective: regression_l1
      n_estimators: 2000
      learning_rate: 0.015
      num_leaves: 63
      min_child_samples: 20
      max_depth: 8
      min_gain_to_split: 0.01
      subsample: 0.75
      bagging_freq: 1
      colsample_bytree: 0.8
      feature_fraction_bynode: 0.8
      reg_lambda: 0.8
      reg_alpha: 0.1
      path_smooth: 0.5
      max_bin: 255
      quantile_heads: []
  catboost_cluster:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    output_dir: data/backtest/catboost_cluster
    params:
      recursive: true
      shap_select: true
      shap_threshold: 0.95
      shap_top_n: null
      shap_sample_size: 500
      correlation_filter: true
      correlation_threshold: 0.95
      variance_filter: true
      variance_threshold: 0.01
      tune_inline: false
      params_file: null
      iterations: 800
      learning_rate: 0.03
      depth: 7
      l2_leaf_reg: 7.5
      subsample: 0.85
      grow_policy: Lossguide
      border_count: 32
      random_strength: 0.4
      min_data_in_leaf: 28
      colsample_bylevel: 0.85
      bagging_temperature: 0.4
      max_leaves: 80
      bootstrap_type: MVS
      model_size_reg: 0.1
      score_function: L2
      boost_from_average: true
      leaf_estimation_method: Newton
      leaf_estimation_iterations: 1
      max_ctr_complexity: 1
  xgboost_cluster:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    output_dir: data/backtest/xgboost_cluster
    params:
      recursive: true
      shap_select: true
      shap_threshold: 0.95
      shap_top_n: null
      shap_sample_size: 500
      correlation_filter: true
      correlation_threshold: 0.95
      variance_filter: true
      variance_threshold: 0.01
      tune_inline: false
      params_file: null
      n_estimators: 2000
      learning_rate: 0.02
      max_depth: 7
      min_child_weight: 15
      subsample: 0.8
      colsample_bytree: 0.8
      grow_policy: lossguide
      max_leaves: 255
      max_bin: 256
      reg_lambda: 5.0
      reg_alpha: 0.5
      gamma: 0.1
      colsample_bylevel: 0.8
      booster: gbtree
  lgbm_cust_enriched:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    output_dir: data/backtest/lgbm_cust_enriched
    params:
      recursive: true
      shap_select: true
      shap_threshold: 0.95
      shap_sample_size: 500
      correlation_filter: true
      correlation_threshold: 0.95
      variance_filter: true
      variance_threshold: 0.01
      customer_features: true
      objective: regression_l1
      n_estimators: 1500
      learning_rate: 0.02
      num_leaves: 63
      min_child_samples: 20
      max_depth: 8
      min_gain_to_split: 0.005
      subsample: 0.7
      bagging_freq: 1
      colsample_bytree: 0.75
      feature_fraction_bynode: 0.6
      reg_lambda: 1.5
      reg_alpha: 0.15
      path_smooth: 1.0
      max_bin: 255
  catboost_cust_enriched:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    output_dir: data/backtest/catboost_cust_enriched
    params:
      recursive: true
      shap_select: true
      shap_threshold: 0.95
      shap_sample_size: 500
      correlation_filter: true
      correlation_threshold: 0.95
      variance_filter: true
      variance_threshold: 0.01
      customer_features: true
      iterations: 800
      learning_rate: 0.03
      depth: 7
      l2_leaf_reg: 9.0
      subsample: 0.85
      grow_policy: Lossguide
      border_count: 32
      random_strength: 0.4
      min_data_in_leaf: 28
      colsample_bylevel: 0.8
      bagging_temperature: 0.4
      max_leaves: 80
      bootstrap_type: MVS
      model_size_reg: 0.1
      score_function: L2
      boost_from_average: true
  xgboost_cust_enriched:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    output_dir: data/backtest/xgboost_cust_enriched
    params:
      recursive: true
      shap_select: true
      shap_threshold: 0.95
      shap_sample_size: 500
      correlation_filter: true
      correlation_threshold: 0.95
      variance_filter: true
      variance_threshold: 0.01
      customer_features: true
      n_estimators: 2000
      learning_rate: 0.02
      max_depth: 7
      min_child_weight: 15
      subsample: 0.8
      colsample_bytree: 0.75
      grow_policy: lossguide
      max_leaves: 255
      max_bin: 256
      reg_lambda: 6.0
      reg_alpha: 0.6
      gamma: 0.1
      colsample_bylevel: 0.75
      booster: gbtree
  chronos:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: false
    forecast: true
    expert: true
    output_dir: data/backtest/chronos
    params:
      model_size: small
      device: auto
      batch_size: 1024
      num_samples: 20
      prediction_length: 6
      num_workers: 1
  chronos_bolt:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: false
    output_dir: data/backtest/chronos_bolt
    params:
      model_size: base
      device: auto
      batch_size: 512
      num_samples: 12
      prediction_length: 6
      num_workers: 1
  chronos2:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: false
    output_dir: data/backtest/chronos2
    params:
      device: auto
      batch_size: 2048
      prediction_length: 6
      num_workers: 1
  chronos2_enriched:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: false
    output_dir: data/backtest/chronos2_enriched
    params:
      device: auto
      batch_size: 1024
      prediction_length: 6
      num_workers: 1
  bolt_hierarchical:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: false
    output_dir: data/backtest/bolt_hierarchical
    notes: Customer-level bottom-up Bolt + top-down reconciliation using true demand
    params:
      model_size: base
      device: auto
      batch_size: 2048
      prediction_length: 6
      n_timeframes: 10
      bu_chunk_size: 200000
      min_nonzero_months: 6
      min_history_months: 6
      max_customers_per_item_loc: 100
      reconciliation_method: weighted_average
      bu_weight: 0.6
  chronos_bolt_ft:                          # ═══ Fine-tuned Chronos-Bolt (spec 32) ═══
    type: foundation                        # same inference type as chronos_bolt; FT is only a weights source
    enabled: true                           # include in pipeline
    tune: false                             # FT is NOT Optuna hyperparameter tuning
    backtest: true                          # eligible for backtest evaluation
    compete: false                          # flip to true once it beats zero-shot chronos_bolt + clears the promote gate
    forecast: false                         # flip to true on promotion; real-model production path is wired (spec 32 §5)
    expert: false
    output_dir: data/backtest/chronos_bolt_ft
    notes: Fine-tuned Chronos-Bolt. Checkpoint built by scripts/ml/finetune_chronos_bolt.py (spec 32).
    params:
      base_model: amazon/chronos-bolt-base  # parent checkpoint (HF hub id or local dir)
      checkpoint_dir: data/models/chronos_bolt_ft  # versioned FT weights; latest v* resolved at load; base fallback if absent
      model_size: base                      # used only to build the base fallback id (amazon/chronos-bolt-<size>)
      device: auto                          # auto -> mps/cuda/cpu (DEMAND_GPU honoured)
      batch_size: 512                       # inference batch size
      num_samples: 12                       # unused by Bolt (quantile output); kept for roster parity
      prediction_length: 6                  # forecast horizon (months)
      fine_tune:                            # ── training hyperparameters (scripts/ml/finetune_chronos_bolt.py) ──
        context_length: 36                  # months of history fed per training window
        prediction_length: 6                # target horizon per window (must equal params.prediction_length)
        learning_rate: 1.0e-4               # AdamW learning rate
        num_steps: 2000                     # training steps (override with --max-steps for smoke runs)
        batch_size: 32                      # training batch size
        warmup_ratio: 0.1                   # LR warmup fraction of total steps
        min_series_months: 12               # exclude series shorter than this from training
        window_stride: 1                    # months between successive training windows of a series
        max_windows_per_series: 24          # cap windows per series (bounds dataset size + memory)
        seed: 42                            # reproducibility
  mstl:
    type: statistical
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: true
    output_dir: data/backtest/mstl
    params:
      season_length: 12
      min_history: 25
  nbeats:
    type: deep_learning
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: true
    output_dir: data/backtest/nbeats
    params:
      h: 6
      input_size: 24
      max_steps: 500
      batch_size: 32
      learning_rate: 0.001
      scaler_type: standard
      early_stop_patience_steps: -1
  nhits:
    type: deep_learning
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: false
    output_dir: data/backtest/nhits
    params:
      h: 6
      input_size: 24
      max_steps: 500
      batch_size: 32
      learning_rate: 0.001
      scaler_type: standard
      early_stop_patience_steps: -1
  seasonal_naive:
    type: statistical
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    output_dir: data/backtest/seasonal_naive
    params: {}
  rolling_mean:
    type: statistical
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: true
    expert: true
    cluster_strategy: per_cluster
    output_dir: data/backtest/rolling_mean
    params:
      window: 6
backtest:
  n_timeframes: 10
  embargo_months: 1
  forecast_horizon: 6
  early_stop_pct: 0.05
  shap_retrain_threshold: 0.5
  shap_min_features: 20
  n_seeds: 1
  tweedie_variance_power: 1.5
  baseline_intermittent: true
  baseline_intermittent_window: 12
  intermittent_threshold: 0.7
  lumpy_threshold: 0.3
  output_dir: data/backtest
  recursive_noise_enabled: true
  recursive_noise_pct: 0.05
  recursive_lag_smooth: 0.15
tuning:
  n_trials: 50
  n_splits: 5
  gap_months: 2
  val_months_per_fold: 3
  min_train_months: 13
  early_stopping_rounds: 50
  n_estimators_max: 2000
  n_estimators_buffer: 1.1
  random_seed: 42
  output_dir: data/tuning
  search_space_ref: hyperparameter_tuning.yaml
champion:
  strategy: rolling
  strategy_params:
    window_months: 6
  fallback_model_id: seasonal_naive
  metric: wape
  lag: execution
  min_sku_rows: 3
  min_dfu_rows: 3
  champion_model_id: champion
  promote_gate:
    enabled: true
    min_wape_improvement_pct: 1.0
    min_coverage_frac: 0.8
    bypass_token: null
  meta_learner:
    model_type: random_forest
    n_estimators: 200
    max_depth: 15
    test_months: 3
    performance_window: 6
  models:
  - lgbm_cluster
  - nhits
  - nbeats
  - mstl
  - chronos2
  - chronos2_enriched
  - seasonal_naive
sweep:
  max_candidates: 24
  default_objective: robust
  default_mode: both
  default_segment_axis: demand_class
  robust_lambda: 0.5
  robust_mu: 0.25
  min_segment_dfus: 30
  parallel_default: false
production_forecast:
  horizon_months: 24
  lookback_months: 36
  min_history_months: 12
  cold_start_model_id: rolling_mean
  cold_start_min_months: 3
  fallback_model_id: lgbm_cluster
  recursive: true
  plan_version_format: '%Y-%m'
  keep_last_n_versions: 3
  production_training:
    enabled: true
    output_dir: data/models
    val_fraction: 0.2
    min_cluster_rows: 50
    save_metadata: true
  confidence_interval:
    enabled: true
    source_model_ids:
    - lgbm_cluster
    - catboost_cluster
    - xgboost_cluster
    residual_lag: 0
    min_residual_months: 6
    z_lower: 1.282
    z_upper: 1.282
    horizon_scaling: sqrt
    sigma_floor: 1.0
    sigma_cap_multiplier: 3.0
  model_registry:
    base_path: data/models
  scheduler:
    job_type: generate_production_forecast
    cron: 0 6 2 * *
tracking:
  backup_dir: data/backtest/tuning_archive
  auto_register: true
  auto_compare_to_latest: true
  improvement_threshold_bps: 5
  verdicts:
    improved_min_delta_accuracy: 0.05
    degraded_max_delta_accuracy: -0.05
  max_archive_runs: 50
clustering:
  enabled: true
  cluster_sizing:
    samples_per_feature: 1
  config_ref: null
  tuning_profiles_ref: cluster_tuning_profiles.yaml
  experiment_templates_ref: cluster_experiment_templates.yaml
  steps:
    generate_features: true
    train_model: true
    label_clusters: true
    update_db: true
  artifacts:
    features_csv: data/staged/clustering_features.csv
    output_dir: data/clustering
  db_target:
    table: dim_sku
    column: ml_cluster
backtest_sampling:
  enabled: true
  default_target_n: 5000
  default_method: proportional
  min_per_cluster: 10
  max_target_n: 20000
  seed: 42
  representativeness_threshold: 0.05
pipeline:
  stages:
  - name: clustering
    description: Segment DFUs into demand-pattern clusters
    makefile_target: cluster-all
    depends_on: []
    enabled_by: clustering.enabled
  - name: backtest
    description: Expanding-window backtest for all enabled algorithms
    makefile_target: backtest-all
    depends_on:
    - clustering
    enabled_by: always
  - name: load
    description: Load backtest predictions into Postgres
    makefile_target: backtest-load-all-bulk
    depends_on:
    - backtest
    enabled_by: always
  - name: champion
    description: Select best model per DFU from backtest results
    makefile_target: champion-all
    depends_on:
    - load
    enabled_by: always
  - name: forecast
    description: Generate production forecasts using champion models
    makefile_target: forecast-generate
    depends_on:
    - champion
    enabled_by: always
  auxiliary:
  - name: seasonality
    description: Detect per-DFU seasonality profiles
    makefile_target: seasonality-all
  - name: variability
    description: Compute per-DFU demand variability class
    makefile_target: variability-all
