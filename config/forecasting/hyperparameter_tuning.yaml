# Hyperparameter Tuning Configuration (Feature 41)
# Used by scripts/tune_hyperparams.py via Optuna Bayesian optimisation.
# Search spaces must not include n_estimators — it is determined by early stopping.

tuning:
  n_trials: 50               # Optuna trials per model
  n_splits: 5                # Walk-forward CV folds
  gap_months: 1              # Months excluded between train-end and val-start (causality)
  val_months_per_fold: 3     # Validation window length per fold
  min_train_months: 13       # Minimum months required for a fold's training set
  early_stopping_rounds: 50  # Rounds with no improvement before stopping
  n_estimators_max: 2000     # Max trees; early stopping selects actual count
  n_estimators_buffer: 1.1   # Multiply mean best rounds by this for final params
  timeout_seconds: null      # Optional wall-clock limit per model (null = no limit)
  random_seed: 42
  output_dir: data/tuning
  mlflow_experiment: hyperparameter_tuning
  # Pruner settings (MedianPruner)
  pruner_n_startup_trials: 15   # Full trials required before any pruning
  pruner_n_warmup_steps: 3      # Folds required before pruning within a trial
  # Inline (per-timeframe) tuning settings — used by --tune-inline in backtest scripts
  inline_n_trials: 20           # Optuna trials per timeframe (fewer than global tuning)
  inline_n_splits: 3            # CV folds per timeframe (fewer than global tuning)

# LightGBM search space
# n_estimators is excluded — determined by early stopping
lgbm:
  search_space:
    learning_rate:
      type: float
      low: 0.005
      high: 0.15
      log: true
    num_leaves:
      type: int
      low: 15
      high: 127
    max_depth:
      type: int
      low: 4
      high: 12
    min_child_samples:
      type: int
      low: 5
      high: 80
    subsample:
      type: float
      low: 0.60
      high: 1.00
    colsample_bytree:
      type: float
      low: 0.60
      high: 1.00
    feature_fraction_bynode:
      type: float
      low: 0.50
      high: 1.00
    path_smooth:
      type: float
      low: 0.0
      high: 5.0
    reg_alpha:
      type: float
      low: 1.0e-8
      high: 10.0
      log: true
    reg_lambda:
      type: float
      low: 1.0e-8
      high: 10.0
      log: true
    min_gain_to_split:
      type: float
      low: 0.0
      high: 5.0
  # Fixed params merged with best_params for backtest scripts
  fixed_params:
    objective: regression_l1
    verbosity: -1
    random_state: 42
    n_jobs: -1
