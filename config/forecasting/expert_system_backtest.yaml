experiment:
  n_timeframes: 10
  forecast_horizon: 6         # months predicted per timeframe
  max_lags: 4                 # lags 0–4 stored (lag 5 excluded by DB constraint)
  algorithm_id: "ExpSys"      # model_id in backtest_lag_archive
  plan_version: "ExpSys_v1"   # plan_version in fact_production_forecast
  output_dir: "data/expert_system_backtest"
  n_workers: 14               # parallel workers for mstl (statsforecast)
  parallel_timeframes: 1      # SERIAL: prevents MPS contention between processes (was 2)
                              # With parallel=2, two subprocesses fought over MPS → nbeats
                              # threw RuntimeError → fell back to chronos silently.

demand_classification:
  adi_threshold: 1.32
  cv2_threshold: 0.49
  high_volume_percentile: 90
  min_history_months: 6
  cv2_volatile_threshold: 1.0        # splits erratic → erratic_mild (cv2<1.0) / erratic_volatile (cv2≥1.0)
  smooth_short_history_months: 18    # splits smooth_low → smooth_low_short (<18mo) / smooth_low (≥18mo)

# Default algorithm per demand archetype.
# Fallbacks activate per-DFU when the primary algorithm cannot produce a prediction
# (insufficient history). The cascade is tried left-to-right until coverage is achieved.
assignment:
  # v4 — sub-split classification (CV² volatile + smooth_low short-history)
  erratic_volatile:    autoces  # cv2≥1.0: adv panel autoces=61.0% on erratic_high, CPU-based, no min_history issues
  erratic_mild:        nbeats   # cv2<1.0: adv panel nbeats=41.5% (proven at scale, beats chronos in full-pop test)
  smooth_high:         mstl     # proven at scale: 75.43% v1, 77.03% v2; adv panel mstl=82.3%
  smooth_low:          nbeats   # proven at scale: 68.87% v1; adv panel nbeats=72.4%
  smooth_low_short:    chronos  # n_periods<18: zero-shot, no training history requirement
  insufficient:        chronos  # confirmed: adv panel chronos=38.2% >> anything else
  intermittent_low:    tsb      # unchanged — TSB specialist for intermittent
  lumpy_low:           tsb      # unchanged — TSB handles obsolescence
  fallbacks:
    autoces:   [mstl, chronos, rolling_mean]
    nbeats:    [chronos, mstl, rolling_mean]
    mstl:      [chronos, rolling_mean]       # v2 fix: chronos before rolling_mean
    chronos:   [mstl, rolling_mean]
    tsb:       [mstl, rolling_mean]
    default:   [rolling_mean]

nhits:
  input_size: 24
  h: 6
  max_steps: 500
  batch_size: 1024            # large batch saturates MPS/GPU better
  learning_rate: 0.001
  min_history: 6

nbeats:
  variant: "generic"          # generic | interpretable
  input_size: 24              # lookback window (months)
  h: 6                        # forecast horizon (months)
  max_steps: 500
  batch_size: 1024            # large batch saturates MPS/GPU better
  learning_rate: 0.001
  min_history: 6              # was 24 — model has start_padding_enabled=True so it handles
                              # short series by zero-padding; no need to exclude most DFUs

holt_winters:
  seasonal_periods: 12
  trend: "add"
  seasonal: "add"
  damped_trend: true
  min_history: 25             # 2*seasonal_periods + 1

chronos:
  model_size: "small"         # tiny | mini | small | base | large
  device: "mps"               # Apple Silicon GPU
  batch_size: 256             # 256 DFUs per inference call vs 32 → fewer kernel launches
  prediction_length: 6
  num_samples: 20

mstl:
  season_length: 12
  min_history: 12             # was 25 — now covers earlier timeframes (DFUs with 1+ year history)

tsb:
  alpha_d: 0.1                # demand smoothing parameter (Teunter-Syntetos-Babai)
  alpha_p: 0.1                # probability smoothing parameter
  min_nonzero: 2              # minimum non-zero observations to fit

rolling_mean:                 # fallback for very-short history DFUs
  window: 6
  min_history: 3
