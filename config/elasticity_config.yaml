# Configuration for scripts/ml/fit_elasticity.py
#
# Gen-4 Roadmap Cross-cutting #3. Learns elasticities (price, promo,
# events, weather) from sales + external signals and writes them into
# `fact_causal_elasticity`. The production forecast layer then reads
# `v_event_uplift_effective` which prefers learned values over manual
# `fact_event_calendar.uplift_pct`.

# Minimum observations required before a coefficient is written. Below
# this threshold the script logs a warning and skips the feature.
min_obs: 24

# Look-back window (months) for the training dataset.
history_months: 36

# Features to fit. Each entry is {name, column_source, transform}:
#   name          — key written to fact_causal_elasticity.feature
#   column_source — expression joined into the dataset (SQL fragment or
#                   'signal:<signal_kind>' to pull from fact_external_signal)
#   transform     — 'none' | 'log1p' | 'zscore'
features:
  - name: price_log             # price elasticity (log-log)
    column_source: signal:unit_price
    transform: log1p
  - name: promo_flag            # binary uplift for promo periods
    column_source: signal:promo_flag
    transform: none
  - name: temp_anomaly          # weather deviation (degrees vs seasonal norm)
    column_source: signal:temp_anomaly
    transform: none

# Backend: only 'linear_regression' supported in the initial scaffold.
# TODO(gen4): wire 'dml_econml' once EconML is approved.
backend: linear_regression

# Run metadata. Written into fact_causal_elasticity.run_id.
run_id_prefix: elast

# Output table. Leave as-is unless you introduce per-env tables.
output_table: fact_causal_elasticity
