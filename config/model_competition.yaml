competition:
  name: default
  metric: accuracy_pct
  lag: execution
  min_sku_rows: 3
  champion_model_id: champion
  fallback_model_id: seasonal_naive
  models:
  - catboost_cluster
  - xgboost_cluster
  - chronos2
  - chronos2_enriched
  - chronos_bolt
  - seasonal_naive
  - rolling_mean
  - mstl
  - nhits
  - nbeats
  strategy: hybrid_warmup
  strategy_params:
    min_prior_months: 3
    warmup_strategy: rolling
    warmup_window: 2
    warmup_min_prior: 1
    primary_strategy: adaptive_ensemble
    primary_top_k: 3
    primary_weight_method: inverse_wape
  meta_learner:
    model_type: random_forest
    n_estimators: 200
    max_depth: 15
    test_months: 3
    performance_window: 6
  min_dfu_rows: 3
