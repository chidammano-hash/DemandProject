# Unified tune strategies — per-model auto-tune strategy overrides.
# Merged from: auto_tune_strategies.yaml, catboost_tune_strategies.yaml, xgboost_tune_strategies.yaml
#
# Each strategy is a named set of overrides applied on top of the base
# algorithm_config.yaml section for that model.  Only the keys that differ
# from the current production config need to be specified — everything else
# is inherited.
#
# Usage:
#   make lgbm-auto-tune RUNS=5          # run first 5 LGBM strategies
#   make lgbm-auto-tune RUNS=10         # run all LGBM strategies
#   uv run python scripts/ml/auto_tune.py --model catboost --runs 10
#   uv run python scripts/ml/auto_tune.py --model xgboost --runs 10
#
# After all runs complete the script prints a leaderboard and optionally
# promotes the best run's params into algorithm_config.yaml.

lgbm:
  strategies:

    - label: "higher_lr_0.05"
      description: "Faster learning rate — quicker convergence, risk of overshoot"
      overrides:
        learning_rate: 0.05

    - label: "lower_lr_0.01"
      description: "Slower learning rate — more precise splits, needs more trees"
      overrides:
        learning_rate: 0.01
        n_estimators: 2500

    - label: "deep_trees"
      description: "Deeper trees with more leaves — captures complex interactions"
      overrides:
        max_depth: 14
        num_leaves: 127

    - label: "shallow_trees"
      description: "Shallow, wide trees — faster training, less overfitting"
      overrides:
        max_depth: 6
        num_leaves: 31
        n_estimators: 2000

    - label: "heavy_regularization"
      description: "Strong L2 + higher min_child_samples — combats overfitting"
      overrides:
        reg_lambda: 5.0
        min_child_samples: 50
        subsample: 0.70

    - label: "light_regularization"
      description: "Minimal regularization — let the trees fit freely"
      overrides:
        reg_lambda: 0.1
        subsample: 0.95
        colsample_bytree: 0.95

    - label: "aggressive_subsample"
      description: "Heavy row + column dropout — maximum stochastic regularization"
      overrides:
        subsample: 0.60
        colsample_bytree: 0.60

    - label: "more_trees_slow_lr"
      description: "2500 trees at LR 0.015 — slow and steady"
      overrides:
        n_estimators: 2500
        learning_rate: 0.015

    - label: "balanced_mid"
      description: "Balanced middle ground — moderate depth, moderate regularization"
      overrides:
        learning_rate: 0.03
        max_depth: 8
        num_leaves: 63
        subsample: 0.75
        colsample_bytree: 0.75
        reg_lambda: 2.0

    - label: "fast_aggressive"
      description: "High LR, fewer trees, deep — fast convergence for rapid iteration"
      overrides:
        learning_rate: 0.08
        n_estimators: 800
        max_depth: 12
        num_leaves: 127

    - label: "sparse_demand_campaign"
      description: "Optimize params for intermittent/sparse DFUs — targets clusters with >50% zero demand"
      overrides:
        num_leaves: 15
        min_child_samples: 200
        reg_alpha: 1.0
        path_smooth: 10

    - label: "seasonal_boost_campaign"
      description: "Enhance seasonal pattern capture with deeper trees and more features retained"
      overrides:
        num_leaves: 127
        colsample_bytree: 0.95
        feature_fraction_bynode: 0.85
        min_gain_to_split: 0.005

    - label: "regularization_heavy"
      description: "Combat overfitting on small/noisy clusters with aggressive regularization"
      overrides:
        reg_alpha: 1.0
        reg_lambda: 5.0
        path_smooth: 10
        min_child_samples: 100
        min_gain_to_split: 0.05

catboost:
  strategies:

    - label: "cb_higher_lr_0.08"
      description: "Faster learning rate — quicker convergence, fewer iterations needed"
      overrides:
        learning_rate: 0.08
        iterations: 300

    - label: "cb_lower_lr_0.01"
      description: "Very slow learning rate — needs many iterations, more precise splits"
      overrides:
        learning_rate: 0.01
        iterations: 2500

    - label: "cb_deep_trees"
      description: "Deeper trees (depth=10) — captures complex demand interactions"
      overrides:
        depth: 10
        iterations: 1000
        min_data_in_leaf: 40

    - label: "cb_shallow_regularized"
      description: "Shallow trees with strong L2 — combats overfitting on noisy clusters"
      overrides:
        depth: 4
        l2_leaf_reg: 8.0
        iterations: 2000
        min_data_in_leaf: 50

    - label: "cb_lossguide_leaf"
      description: "Lossguide grow policy with leaf count cap — leaf-wise splitting like LightGBM"
      overrides:
        grow_policy: "Lossguide"
        max_leaves: 63
        depth: 8
        iterations: 1500

    - label: "cb_border_count_low"
      description: "Reduced border_count=64 — faster training, better on noisy features"
      overrides:
        border_count: 64
        iterations: 1500

    - label: "cb_heavy_bagging"
      description: "Aggressive stochastic gradient boosting — subsample + column dropout"
      overrides:
        subsample: 0.65
        bagging_temperature: 0.3
        colsample_bylevel: 0.70

    - label: "cb_moderate_bagging"
      description: "Moderate bagging — balanced row/column sampling for stability"
      overrides:
        subsample: 0.82
        bagging_temperature: 0.5
        colsample_bylevel: 0.85

    - label: "cb_random_strength_high"
      description: "High random_strength — adds noise to split scores, reduces overfit on small clusters"
      overrides:
        random_strength: 3.0
        l2_leaf_reg: 5.0

    - label: "cb_champion_blend"
      description: "Best combination: Lossguide + low border_count + moderate bagging + slow LR"
      overrides:
        grow_policy: "Lossguide"
        max_leaves: 63
        border_count: 64
        iterations: 2200
        learning_rate: 0.012
        depth: 8
        l2_leaf_reg: 6.5
        subsample: 0.82
        bagging_temperature: 0.4
        random_strength: 0.6
        min_data_in_leaf: 30
        colsample_bylevel: 0.85

    # ── Phase 3 strategies (advanced optimization) ────────────────────────

    - label: "cb_ultra_slow_lr"
      description: "Ultra-slow convergence — 3000 iters at LR=0.008 for residual pattern capture"
      overrides:
        iterations: 3000
        learning_rate: 0.008

    - label: "cb_mvs_bootstrap"
      description: "Minimum Variance Sampling — reduces gradient noise for volatile demand clusters"
      overrides:
        bootstrap_type: "MVS"
        subsample: 0.85
        iterations: 3000
        learning_rate: 0.008

    - label: "cb_model_size_reg"
      description: "Model size regularization + Newton leaf estimation — L0 penalty prevents tree bloat"
      overrides:
        model_size_reg: 0.1
        leaf_estimation_method: "Newton"
        bootstrap_type: "MVS"

    - label: "cb_boost_refined"
      description: "Boosting refinement — boost_from_average + 10 Newton leaf estimation iterations"
      overrides:
        boost_from_average: true
        leaf_estimation_iterations: 10
        score_function: "L2"
        model_size_reg: 0.1
        leaf_estimation_method: "Newton"
        bootstrap_type: "MVS"

    - label: "cb_champion_v2"
      description: "Phase 3 champion: MVS + model_size_reg + boost refinement + 127 leaves + depth=10"
      overrides:
        iterations: 3000
        learning_rate: 0.008
        depth: 10
        l2_leaf_reg: 7.5
        border_count: 64
        bagging_temperature: 0.4
        random_strength: 0.5
        min_data_in_leaf: 28
        subsample: 0.85
        grow_policy: "Lossguide"
        max_leaves: 127
        colsample_bylevel: 0.85
        bootstrap_type: "MVS"
        model_size_reg: 0.08
        leaf_estimation_method: "Newton"
        boost_from_average: true
        leaf_estimation_iterations: 10
        score_function: "L2"

xgboost:
  strategies:

    - label: "xgb_higher_lr_0.08"
      description: "Faster convergence with higher LR — needs fewer trees"
      overrides:
        learning_rate: 0.08
        n_estimators: 400

    - label: "xgb_lower_lr_0.01"
      description: "Very slow learning rate — requires many trees for convergence"
      overrides:
        learning_rate: 0.01
        n_estimators: 2500

    - label: "xgb_deep_trees"
      description: "Deeper trees (max_depth=10) with heavier regularization"
      overrides:
        max_depth: 10
        min_child_weight: 15
        reg_lambda: 5.0
        gamma: 0.2

    - label: "xgb_shallow_wide"
      description: "Shallow trees — faster training, less overfitting, more trees needed"
      overrides:
        max_depth: 4
        n_estimators: 2000
        reg_lambda: 1.0
        min_child_weight: 20

    - label: "xgb_dart_dropout"
      description: "DART booster with dropout — reduces overfitting by dropping trees"
      overrides:
        booster: "dart"
        rate_drop: 0.1
        skip_drop: 0.5
        learning_rate: 0.025
        n_estimators: 1500

    - label: "xgb_heavy_regularization"
      description: "Strong L1+L2 + gamma pruning — maximum overfitting protection"
      overrides:
        reg_lambda: 8.0
        reg_alpha: 1.0
        gamma: 0.3
        min_child_weight: 20

    - label: "xgb_column_sampling"
      description: "Aggressive column sampling at tree + level — feature-level regularization"
      overrides:
        colsample_bytree: 0.60
        colsample_bylevel: 0.70
        subsample: 0.75

    - label: "xgb_lossguide_leaf"
      description: "Leaf-wise splitting with max_leaves cap — mimics LightGBM strategy"
      overrides:
        grow_policy: "lossguide"
        max_leaves: 63
        max_depth: 0
        n_estimators: 1800

    - label: "xgb_max_bin_tuned"
      description: "Reduced histogram bins for faster training and regularization effect"
      overrides:
        max_bin: 128
        n_estimators: 1800
        learning_rate: 0.015

    - label: "xgb_champion_blend"
      description: "Best combination: lossguide + balanced sampling + slow LR + full feature set"
      overrides:
        grow_policy: "lossguide"
        max_leaves: 63
        max_bin: 128
        n_estimators: 2000
        learning_rate: 0.012
        max_depth: 8
        min_child_weight: 12
        subsample: 0.82
        colsample_bytree: 0.75
        colsample_bylevel: 0.80
        reg_lambda: 4.5
        reg_alpha: 0.25
        gamma: 0.15

    # ── Phase 3 strategies (advanced optimization) ────────────────────────

    - label: "xgb_ultra_slow_lr"
      description: "Ultra-slow convergence — 3000 trees at LR=0.008 for residual pattern capture"
      overrides:
        n_estimators: 3000
        learning_rate: 0.008

    - label: "xgb_127_leaves"
      description: "Expanded leaf complexity — 127 leaves + depth=10 with heavier regularization"
      overrides:
        max_leaves: 127
        max_depth: 10
        reg_lambda: 6.0
        gamma: 0.20

    - label: "xgb_hist_256bins"
      description: "Histogram precision — 256 bins for finer splits on continuous features"
      overrides:
        max_bin: 256
        max_depth: 10
        max_leaves: 127
        reg_lambda: 6.0
        gamma: 0.20

    - label: "xgb_dart_v3"
      description: "Conservative DART — 5% drop rate with V3 features and 256 bins"
      overrides:
        booster: "dart"
        rate_drop: 0.05
        skip_drop: 0.60
        learning_rate: 0.010
        n_estimators: 2500
        max_bin: 256
        max_leaves: 127

    - label: "xgb_champion_v2"
      description: "Phase 3 champion: DART + 256 bins + 127 leaves + balanced reg + ultra-slow LR"
      overrides:
        n_estimators: 2800
        learning_rate: 0.009
        max_depth: 10
        min_child_weight: 10
        subsample: 0.82
        colsample_bytree: 0.75
        colsample_bylevel: 0.85
        reg_lambda: 5.5
        reg_alpha: 0.30
        gamma: 0.12
        max_bin: 256
        grow_policy: "lossguide"
        max_leaves: 127
        booster: "dart"
        rate_drop: 0.05
        skip_drop: 0.60
