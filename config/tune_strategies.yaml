# Unified tune strategies — per-model auto-tune strategy overrides.
# Merged from: auto_tune_strategies.yaml, catboost_tune_strategies.yaml, xgboost_tune_strategies.yaml
#
# Each strategy is a named set of overrides applied on top of the base
# algorithm_config.yaml section for that model.  Only the keys that differ
# from the current production config need to be specified — everything else
# is inherited.
#
# Usage:
#   make lgbm-auto-tune RUNS=5          # run first 5 LGBM strategies
#   make lgbm-auto-tune RUNS=10         # run all LGBM strategies
#   uv run python scripts/ml/auto_tune.py --model catboost --runs 10
#   uv run python scripts/ml/auto_tune.py --model xgboost --runs 10
#
# After all runs complete the script prints a leaderboard and optionally
# promotes the best run's params into algorithm_config.yaml.
#
# Consumed by: scripts/ml/auto_tune.py (load_strategies -> apply_overrides)
# Each strategy generates a temp forecast_pipeline_config.yaml, runs a
# backtest, registers the run, and the best is optionally promoted.

lgbm:
  strategies:                               # LightGBM hyperparameter strategies list

    - label: "higher_lr_0.05"               # Unique identifier shown in leaderboard
      description: "Faster learning rate — quicker convergence, risk of overshoot"
      overrides:                            # Keys override algorithms.lgbm_cluster.params in forecast_pipeline_config.yaml
        learning_rate: 0.05                 # Step size shrinkage per boosting round (higher = faster convergence, more overshoot)

    - label: "lower_lr_0.01"
      description: "Slower learning rate — more precise splits, needs more trees"
      overrides:
        learning_rate: 0.01                 # Very small step size — needs many more trees to converge
        n_estimators: 2500                  # Max boosting rounds (early stopping may terminate sooner)

    - label: "deep_trees"
      description: "Deeper trees with more leaves — captures complex interactions"
      overrides:
        max_depth: 14                       # Maximum tree depth — deeper trees model more complex interactions
        num_leaves: 127                     # Max number of leaves per tree (should be <= 2^max_depth - 1)

    - label: "shallow_trees"
      description: "Shallow, wide trees — faster training, less overfitting"
      overrides:
        max_depth: 6                        # Shallow depth limits model complexity
        num_leaves: 31                      # Fewer leaves = simpler, faster trees
        n_estimators: 2000                  # More trees compensate for reduced per-tree capacity

    - label: "heavy_regularization"
      description: "Strong L2 + higher min_child_samples — combats overfitting"
      overrides:
        reg_lambda: 5.0                     # L2 regularization term on leaf weights (higher = stronger penalty)
        min_child_samples: 50               # Min data points per leaf — prevents splits on sparse data
        subsample: 0.70                     # Row sampling ratio per tree (0.70 = use 70% of rows)

    - label: "light_regularization"
      description: "Minimal regularization — let the trees fit freely"
      overrides:
        reg_lambda: 0.1                     # Very light L2 penalty
        subsample: 0.95                     # Near-full row sampling
        colsample_bytree: 0.95             # Column sampling ratio per tree (0.95 = use 95% of features)

    - label: "aggressive_subsample"
      description: "Heavy row + column dropout — maximum stochastic regularization"
      overrides:
        subsample: 0.60                     # Use only 60% of rows per tree (strong stochastic regularization)
        colsample_bytree: 0.60             # Use only 60% of features per tree

    - label: "more_trees_slow_lr"
      description: "2500 trees at LR 0.015 — slow and steady"
      overrides:
        n_estimators: 2500                  # Large tree budget for gradual refinement
        learning_rate: 0.015                # Slow learning rate for fine-grained convergence

    - label: "balanced_mid"
      description: "Balanced middle ground — moderate depth, moderate regularization"
      overrides:
        learning_rate: 0.03                 # Moderate step size
        max_depth: 8                        # Mid-range tree depth
        num_leaves: 63                      # Moderate leaf count (~2^6 - 1)
        subsample: 0.75                     # 75% row sampling
        colsample_bytree: 0.75             # 75% column sampling
        reg_lambda: 2.0                     # Moderate L2 penalty

    - label: "fast_aggressive"
      description: "High LR, fewer trees, deep — fast convergence for rapid iteration"
      overrides:
        learning_rate: 0.08                 # High step size — converges fast, good for quick experiments
        n_estimators: 800                   # Fewer trees needed at high LR
        max_depth: 12                       # Deep trees for high expressiveness
        num_leaves: 127                     # Many leaves per tree

    - label: "sparse_demand_campaign"
      description: "Optimize params for intermittent/sparse DFUs — targets clusters with >50% zero demand"
      overrides:
        num_leaves: 15                      # Very few leaves — simpler splits for sparse data
        min_child_samples: 200              # High threshold prevents overfitting on rare non-zero demand
        reg_alpha: 1.0                      # L1 regularization — encourages sparsity in leaf weights
        path_smooth: 10                     # Smoothing factor for leaf value estimation (reduces variance)

    - label: "seasonal_boost_campaign"
      description: "Enhance seasonal pattern capture with deeper trees and more features retained"
      overrides:
        num_leaves: 127                     # Many leaves to capture seasonal patterns
        colsample_bytree: 0.95             # Retain nearly all features (seasonal features are important)
        feature_fraction_bynode: 0.85       # Per-split feature sampling (LightGBM-specific — samples features at each node)
        min_gain_to_split: 0.005            # Very low split gain threshold — allows subtle seasonal splits

    - label: "regularization_heavy"
      description: "Combat overfitting on small/noisy clusters with aggressive regularization"
      overrides:
        reg_alpha: 1.0                      # L1 regularization on leaf weights
        reg_lambda: 5.0                     # L2 regularization on leaf weights
        path_smooth: 10                     # Leaf value smoothing (higher = more regularization)
        min_child_samples: 100              # High min samples per leaf
        min_gain_to_split: 0.05             # Prune splits with low information gain

catboost:
  strategies:                               # CatBoost hyperparameter strategies list

    - label: "cb_higher_lr_0.08"
      description: "Faster learning rate — quicker convergence, fewer iterations needed"
      overrides:
        learning_rate: 0.08                 # Step size per boosting iteration
        iterations: 300                     # Max boosting iterations (CatBoost uses 'iterations' instead of 'n_estimators')

    - label: "cb_lower_lr_0.01"
      description: "Very slow learning rate — needs many iterations, more precise splits"
      overrides:
        learning_rate: 0.01                 # Very small step size
        iterations: 2500                    # Many iterations to compensate for low LR

    - label: "cb_deep_trees"
      description: "Deeper trees (depth=10) — captures complex demand interactions"
      overrides:
        depth: 10                           # Max tree depth (CatBoost uses 'depth' instead of 'max_depth')
        iterations: 1000                    # Moderate iteration count for deep trees
        min_data_in_leaf: 40                # Min samples in a leaf node (CatBoost equivalent of min_child_samples)

    - label: "cb_shallow_regularized"
      description: "Shallow trees with strong L2 — combats overfitting on noisy clusters"
      overrides:
        depth: 4                            # Shallow trees — low complexity
        l2_leaf_reg: 8.0                    # L2 regularization on leaf values (CatBoost-specific)
        iterations: 2000                    # More iterations needed for shallow trees
        min_data_in_leaf: 50                # High leaf sample threshold

    - label: "cb_lossguide_leaf"
      description: "Lossguide grow policy with leaf count cap — leaf-wise splitting like LightGBM"
      overrides:
        grow_policy: "Lossguide"            # Leaf-wise tree growth (vs default depth-wise 'SymmetricTree')
        max_leaves: 63                      # Cap on number of leaves (only used with Lossguide)
        depth: 8                            # Max depth per tree
        iterations: 1500                    # Moderate iteration budget

    - label: "cb_border_count_low"
      description: "Reduced border_count=64 — faster training, better on noisy features"
      overrides:
        border_count: 64                    # Number of feature split candidates (lower = faster + more robust to noise; default 254)
        iterations: 1500                    # Moderate iterations

    - label: "cb_heavy_bagging"
      description: "Aggressive stochastic gradient boosting — subsample + column dropout"
      overrides:
        subsample: 0.65                     # Row sampling ratio per iteration (requires Bernoulli or MVS bootstrap)
        bagging_temperature: 0.3            # Controls Bayesian bootstrap aggressiveness (lower = closer to standard bootstrap)
        colsample_bylevel: 0.70             # Feature sampling ratio per tree level

    - label: "cb_moderate_bagging"
      description: "Moderate bagging — balanced row/column sampling for stability"
      overrides:
        subsample: 0.82                     # 82% row sampling
        bagging_temperature: 0.5            # Moderate Bayesian bootstrap temperature
        colsample_bylevel: 0.85             # 85% feature sampling per level

    - label: "cb_random_strength_high"
      description: "High random_strength — adds noise to split scores, reduces overfit on small clusters"
      overrides:
        random_strength: 3.0                # Noise magnitude added to split scores (higher = more randomization)
        l2_leaf_reg: 5.0                    # L2 regularization on leaf values

    - label: "cb_champion_blend"
      description: "Best combination: Lossguide + low border_count + moderate bagging + slow LR"
      overrides:
        grow_policy: "Lossguide"            # Leaf-wise growth
        max_leaves: 63                      # Leaf count cap
        border_count: 64                    # Reduced split candidates
        iterations: 2200                    # Large iteration budget
        learning_rate: 0.012                # Slow convergence
        depth: 8                            # Moderate depth
        l2_leaf_reg: 6.5                    # Strong L2 regularization
        subsample: 0.82                     # Row sampling
        bagging_temperature: 0.4            # Bayesian bootstrap temperature
        random_strength: 0.6                # Mild split randomization
        min_data_in_leaf: 30                # Moderate leaf sample threshold
        colsample_bylevel: 0.85             # Feature sampling per level

    # ── Phase 3 strategies (advanced optimization) ────────────────────────

    - label: "cb_ultra_slow_lr"
      description: "Ultra-slow convergence — 3000 iters at LR=0.008 for residual pattern capture"
      overrides:
        iterations: 3000                    # Very large iteration budget
        learning_rate: 0.008                # Ultra-slow step size for capturing residual patterns

    - label: "cb_mvs_bootstrap"
      description: "Minimum Variance Sampling — reduces gradient noise for volatile demand clusters"
      overrides:
        bootstrap_type: "MVS"               # Minimum Variance Sampling — selects samples to minimize gradient variance
        subsample: 0.85                     # Row sampling ratio with MVS
        iterations: 3000                    # Large budget for slow convergence
        learning_rate: 0.008                # Ultra-slow LR

    - label: "cb_model_size_reg"
      description: "Model size regularization + Newton leaf estimation — L0 penalty prevents tree bloat"
      overrides:
        model_size_reg: 0.1                 # L0-like penalty on total model size (num leaves * iterations)
        leaf_estimation_method: "Newton"     # Use Newton's method for leaf value estimation (more precise than Gradient)
        bootstrap_type: "MVS"               # MVS for reduced gradient noise

    - label: "cb_boost_refined"
      description: "Boosting refinement — boost_from_average + 10 Newton leaf estimation iterations"
      overrides:
        boost_from_average: true            # Initialize first tree predictions from target mean (reduces early residuals)
        leaf_estimation_iterations: 10      # Number of Newton iterations per leaf value (more = more precise)
        score_function: "L2"                # Split score function — L2 (MSE) for regression tasks
        model_size_reg: 0.1                 # L0 model size penalty
        leaf_estimation_method: "Newton"     # Newton leaf estimation
        bootstrap_type: "MVS"               # MVS bootstrap

    - label: "cb_champion_v2"
      description: "Phase 3 champion: MVS + model_size_reg + boost refinement + 127 leaves + depth=10"
      overrides:
        iterations: 3000                    # Very large iteration budget
        learning_rate: 0.008                # Ultra-slow convergence
        depth: 10                           # Deep trees for complex interactions
        l2_leaf_reg: 7.5                    # Strong L2 leaf regularization
        border_count: 64                    # Reduced split candidates
        bagging_temperature: 0.4            # Moderate Bayesian bootstrap
        random_strength: 0.5                # Moderate split randomization
        min_data_in_leaf: 28                # Moderate leaf threshold
        subsample: 0.85                     # Row sampling with MVS
        grow_policy: "Lossguide"            # Leaf-wise tree growth
        max_leaves: 127                     # High leaf complexity
        colsample_bylevel: 0.85             # 85% feature sampling per level
        bootstrap_type: "MVS"               # Minimum Variance Sampling
        model_size_reg: 0.08                # L0 model size penalty (slightly less than cb_model_size_reg)
        leaf_estimation_method: "Newton"     # Newton leaf value estimation
        boost_from_average: true            # Start from target mean
        leaf_estimation_iterations: 10      # 10 Newton iterations per leaf
        score_function: "L2"                # L2 split score

xgboost:
  strategies:                               # XGBoost hyperparameter strategies list

    - label: "xgb_higher_lr_0.08"
      description: "Faster convergence with higher LR — needs fewer trees"
      overrides:
        learning_rate: 0.08                 # Step size shrinkage (eta in XGBoost docs)
        n_estimators: 400                   # Max boosting rounds

    - label: "xgb_lower_lr_0.01"
      description: "Very slow learning rate — requires many trees for convergence"
      overrides:
        learning_rate: 0.01                 # Very small step size
        n_estimators: 2500                  # Many trees to compensate

    - label: "xgb_deep_trees"
      description: "Deeper trees (max_depth=10) with heavier regularization"
      overrides:
        max_depth: 10                       # Max tree depth (deeper = more complex)
        min_child_weight: 15                # Min sum of instance weight (Hessian) in a child (higher = more conservative)
        reg_lambda: 5.0                     # L2 regularization on leaf weights
        gamma: 0.2                          # Min loss reduction to make a split (higher = more pruning)

    - label: "xgb_shallow_wide"
      description: "Shallow trees — faster training, less overfitting, more trees needed"
      overrides:
        max_depth: 4                        # Shallow depth
        n_estimators: 2000                  # More trees to compensate
        reg_lambda: 1.0                     # Moderate L2 regularization
        min_child_weight: 20                # Conservative leaf splits

    - label: "xgb_dart_dropout"
      description: "DART booster with dropout — reduces overfitting by dropping trees"
      overrides:
        booster: "dart"                     # DART booster — Dropouts meet Multiple Additive Regression Trees
        rate_drop: 0.1                      # Fraction of trees dropped per round (0.1 = 10%)
        skip_drop: 0.5                      # Probability of skipping dropout entirely for a round
        learning_rate: 0.025                # Lower LR works well with DART
        n_estimators: 1500                  # Moderate tree budget

    - label: "xgb_heavy_regularization"
      description: "Strong L1+L2 + gamma pruning — maximum overfitting protection"
      overrides:
        reg_lambda: 8.0                     # Strong L2 regularization
        reg_alpha: 1.0                      # L1 regularization (encourages sparse leaf weights)
        gamma: 0.3                          # High min split gain threshold (aggressive pruning)
        min_child_weight: 20                # High child weight threshold

    - label: "xgb_column_sampling"
      description: "Aggressive column sampling at tree + level — feature-level regularization"
      overrides:
        colsample_bytree: 0.60             # Feature sampling ratio per tree (60%)
        colsample_bylevel: 0.70             # Feature sampling ratio per tree level (70%)
        subsample: 0.75                     # Row sampling ratio (75%)

    - label: "xgb_lossguide_leaf"
      description: "Leaf-wise splitting with max_leaves cap — mimics LightGBM strategy"
      overrides:
        grow_policy: "lossguide"            # Leaf-wise tree growth (vs default 'depthwise')
        max_leaves: 63                      # Max leaf count per tree (only effective with lossguide)
        max_depth: 0                        # 0 = no depth limit (leaves controlled by max_leaves)
        n_estimators: 1800                  # Moderate tree budget

    - label: "xgb_max_bin_tuned"
      description: "Reduced histogram bins for faster training and regularization effect"
      overrides:
        max_bin: 128                        # Number of histogram bins for feature discretization (lower = faster, coarser splits)
        n_estimators: 1800                  # Moderate tree budget
        learning_rate: 0.015                # Slow LR

    - label: "xgb_champion_blend"
      description: "Best combination: lossguide + balanced sampling + slow LR + full feature set"
      overrides:
        grow_policy: "lossguide"            # Leaf-wise growth
        max_leaves: 63                      # Leaf count cap
        max_bin: 128                        # Reduced histogram bins
        n_estimators: 2000                  # Large tree budget
        learning_rate: 0.012                # Slow convergence
        max_depth: 8                        # Moderate depth
        min_child_weight: 12                # Moderate child weight threshold
        subsample: 0.82                     # 82% row sampling
        colsample_bytree: 0.75             # 75% feature sampling per tree
        colsample_bylevel: 0.80             # 80% feature sampling per level
        reg_lambda: 4.5                     # Strong L2 regularization
        reg_alpha: 0.25                     # Light L1 regularization
        gamma: 0.15                         # Moderate split pruning threshold

    # ── Phase 3 strategies (advanced optimization) ────────────────────────

    - label: "xgb_ultra_slow_lr"
      description: "Ultra-slow convergence — 3000 trees at LR=0.008 for residual pattern capture"
      overrides:
        n_estimators: 3000                  # Very large tree budget
        learning_rate: 0.008                # Ultra-slow step size

    - label: "xgb_127_leaves"
      description: "Expanded leaf complexity — 127 leaves + depth=10 with heavier regularization"
      overrides:
        max_leaves: 127                     # High leaf complexity (requires lossguide grow_policy)
        max_depth: 10                       # Deep trees
        reg_lambda: 6.0                     # Strong L2 to offset complexity
        gamma: 0.20                         # Moderate split pruning

    - label: "xgb_hist_256bins"
      description: "Histogram precision — 256 bins for finer splits on continuous features"
      overrides:
        max_bin: 256                        # More histogram bins = finer feature split points
        max_depth: 10                       # Deep trees
        max_leaves: 127                     # High leaf count
        reg_lambda: 6.0                     # Strong L2
        gamma: 0.20                         # Moderate pruning

    - label: "xgb_dart_v3"
      description: "Conservative DART — 5% drop rate with V3 features and 256 bins"
      overrides:
        booster: "dart"                     # DART booster with tree dropout
        rate_drop: 0.05                     # 5% tree dropout rate (conservative)
        skip_drop: 0.60                     # 60% chance of skipping dropout per round
        learning_rate: 0.010                # Slow LR
        n_estimators: 2500                  # Large tree budget
        max_bin: 256                        # Fine histogram bins
        max_leaves: 127                     # High leaf complexity

    - label: "xgb_champion_v2"
      description: "Phase 3 champion: DART + 256 bins + 127 leaves + balanced reg + ultra-slow LR"
      overrides:
        n_estimators: 2800                  # Large tree budget
        learning_rate: 0.009                # Near-ultra-slow step size
        max_depth: 10                       # Deep trees
        min_child_weight: 10                # Moderate child weight threshold
        subsample: 0.82                     # 82% row sampling
        colsample_bytree: 0.75             # 75% feature sampling per tree
        colsample_bylevel: 0.85             # 85% feature sampling per level
        reg_lambda: 5.5                     # Strong L2 regularization
        reg_alpha: 0.30                     # Light L1 regularization
        gamma: 0.12                         # Moderate split pruning
        max_bin: 256                        # Fine histogram bins
        grow_policy: "lossguide"            # Leaf-wise growth
        max_leaves: 127                     # High leaf complexity
        booster: "dart"                     # DART with tree dropout
        rate_drop: 0.05                     # 5% tree dropout
        skip_drop: 0.60                     # 60% skip probability
