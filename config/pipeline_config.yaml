# Pipeline Orchestrator Configuration
# Used by scripts/etl/run_pipeline.py

# Domain processing order (dimensions first, then facts)
domain_order:
  - item
  - location
  - customer
  - time
  - sku
  - sales
  - forecast
  - inventory
  - sourcing
  - purchase_order

# Source data directory (relative to project root)
source_data_dir: data/input

# Parallel settings (used when --parallel flag is passed)
parallel:
  max_workers: 4           # legacy fallback
  normalize_workers: 4     # concurrent normalize subprocesses
  load_workers: 4          # concurrent loads (two-wave: dims then facts)
  mv_refresh_workers: 3    # concurrent MV refreshes

# Materialized views to refresh per domain
mv_refresh:
  sales:
    - agg_sales_monthly
  forecast:
    - agg_forecast_monthly
    - agg_accuracy_by_dim
    - agg_accuracy_lag_archive
    - agg_dfu_coverage
    - agg_dfu_coverage_lag_archive
  inventory:
    - agg_inventory_monthly
    - mv_inventory_forecast_monthly
    - mv_inventory_health_score
    - mv_supplier_performance
    - mv_fill_rate_monthly
    - mv_intramonth_stockout
  item: []
  location: []
  customer: []
  time: []
  sku: []
  sourcing: []
  purchase_order: []

# Always refresh after any pipeline run
always_refresh:
  - mv_dq_dashboard
  - mv_control_tower_kpis
