experiment:
  n_timeframes: 10
  forecast_horizon: 6
  max_lags: 4
  algorithm_id: "ExpSys"
  plan_version: "ExpSys_v5c"
  output_dir: "data/expert_system_backtest_1401bulk_v5c"
  n_workers: 14
  parallel_timeframes: 1

demand_classification:
  adi_threshold: 1.32
  cv2_threshold: 0.49
  high_volume_percentile: 90
  min_history_months: 6
  cv2_volatile_threshold: 1.0
  smooth_short_history_months: 18

assignment:
  # v5c — tree models for erratic segments at 1401-BULK
  erratic_volatile:    catboost_cluster  # tree model: trains per archetype partition
  erratic_mild:        lgbm_cluster      # tree model: cross-DFU patterns in erratic
  smooth_high:         mstl              # proven: 75.43% execution lag
  smooth_low:          mstl              # CPU-only: avoid MPS after tree model training
  smooth_low_short:    mstl             # CPU-only: mstl handles ≥12mo (min_history=12)
  insufficient:        rolling_mean      # CPU-only: <6mo history, best we can do without GPU
  intermittent_low:    tsb
  lumpy_low:           tsb
  fallbacks:
    catboost_cluster:  [mstl, rolling_mean]
    lgbm_cluster:      [mstl, rolling_mean]
    mstl:              [rolling_mean]
    tsb:               [mstl, rolling_mean]
    default:           [rolling_mean]

chronos:
  model_size: "small"
  device: "mps"
  batch_size: 256
  prediction_length: 6
  num_samples: 20

mstl:
  season_length: 12
  min_history: 12

tsb:
  alpha_d: 0.1
  alpha_p: 0.1
  min_nonzero: 2

rolling_mean:
  window: 6
  min_history: 3
