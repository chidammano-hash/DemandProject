# Inventory Rebalancing Configuration

_includes: [shared_constants]

network:
  default_transfer_lt_days: 3
  default_cost_per_unit: 0.50
  default_min_transfer_qty: 10
  default_batch_size: 1

optimization:
  solver: "greedy"               # greedy | lp
  horizon_weeks: 4               # rolling planning horizon
  time_limit_seconds: 60         # solver wall clock limit
  objective: "min_cost"          # min_cost | max_service | equalize_dos

# ═══ GEN-4 SC-4: OBJECTIVE SELECTION ═══
# Defines behavior for each objective branch. min_cost is the default
# cost-minimising greedy. max_service prioritises filling the largest
# shortages first (ignore transfer cost if ROI is positive). equalize_dos
# targets a level DOS across the network by moving surplus to deficit.
objectives:
  min_cost:
    description: "Cost-optimal greedy (default)"
  max_service:
    description: "Fill largest shortage first; tiebreak by urgency"
    shortage_weight: 1.0            # weight on absolute shortage qty
    urgency_tiebreak: true          # when shortage equal, prefer higher urgency
  equalize_dos:
    description: "Balance days-of-supply across the network"
    target_dos_tolerance_pct: 0.10  # within ±10% of network mean DOS = balanced (skip)
    max_move_per_item: 1000         # cap qty moved per item per run (safety)

# ═══ GEN-4 SC-4: AVAILABLE-SUPPLY SOURCES ═══
# Rebalancing now considers on-hand + in-transit + open POs when projecting
# supply. Toggle each source independently for A/B experiments.
available_supply:
  include_on_hand: true
  include_in_transit: true          # fact_inventory_in_transit (if present)
  include_open_pos: true            # fact_purchase_orders WHERE is_closed = FALSE
  projected_stockout_trigger: true  # trigger when projected_stockout_date < planning_date + transfer_lt


triggers:
  excess_threshold_pct: 1.50     # on_hand / ss_target > 150% = excess
  shortage_threshold_pct: 0.80   # on_hand / ss_target < 80% = shortage
  dos_cv_threshold: 0.40         # network DOS CV > 0.40 = imbalanced
  min_benefit_per_transfer: 5.0  # minimum net benefit ($) to recommend

costs:
  default_handling_cost: 0.10    # $/unit at source
  default_freight_cost: 0.30     # $/unit inter-location
  default_receiving_cost: 0.10   # $/unit at destination
  stockout_cost_multiplier: 5.0  # revenue multiplier for missed sales
  # carrying_cost_annual_pct inherited from shared_constants.yaml via _includes

constraints:
  frozen_period_days: 7          # no transfers in first N days of approved plan
  max_source_drawdown_pct: 0.30  # never take more than 30% of source on_hand
  abc_priority_order: ["A", "B", "C"]  # A-class items prioritised first

scheduling:
  auto_compute_cron: "0 5 * * 1" # weekly Monday at 5 AM
  auto_compute_enabled: false
