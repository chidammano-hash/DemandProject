clustering:
  min_months_history: 12
  time_window_months: 36   # 3 years for better seasonality detection
  k_range: [9, 18]          # 5% min = max 20 clusters; start at 5 for business meaningfulness
  min_cluster_size_pct: 2.0  # Each cluster must be >= 2% of SKUs (~5,490 with 274K SKUs)
  feature_scaling: "standard"
  use_pca: false
  pca_components: null

  labeling:
    volume_thresholds:
      very_high: 0.90   # top 10%
      high: 0.75        # top 25%
      low: 0.25         # bottom 25%
      very_low: 0.10    # bottom 10%
    cv_thresholds:
      very_steady: 0.2
      steady: 0.4
      volatile: 0.8
      very_volatile: 1.2
    seasonality_threshold: 0.3      # seasonal_amplitude > 0.3
    seasonality_r2_threshold: 0.25  # seasonal_r2 > 25%
    periodicity_threshold: 0.25     # periodicity_strength > 0.25
    zero_demand_threshold: 0.15     # intermittent if > 15% zeros
    adi_threshold: 1.5              # intermittent if ADI > 1.5 months
    trend_r2_threshold: 0.25        # meaningful trend if trend_r2 > 0.25
    cagr_growing: 5.0               # growing if CAGR > 5%
    cagr_declining: -5.0            # declining if CAGR < -5%
    recency_ratio_high: 1.2         # accelerating if recency_ratio > 1.2
    recency_ratio_low: 0.8          # decelerating if recency_ratio < 0.8
