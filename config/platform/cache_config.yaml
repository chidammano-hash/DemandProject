# ═══ CACHE CONFIG ═══
# API response caching configuration (Spec 08-03)
# Used by: common/services/cache.py (@cached decorator), api middleware
# Backends: RedisBackend (default, multi-worker safe) or InMemoryBackend (per-process fallback)
#
# Fallback behavior: if backend=redis and the Redis server is unreachable
# (connection refused, DNS failure, missing redis package), the cache layer
# transparently falls back to InMemoryBackend with a logged warning. Tests and
# environments without Redis still work — only the multi-worker hit-rate
# guarantee + single-flight stampede protection are lost in that mode.

backend: redis                           # Cache backend; options: 'redis' (default — shared, multi-worker, single-flight) or 'memory' (per-process dict, dev-only)
redis_url: ${REDIS_URL:-redis://localhost:6379/0}  # Redis connection URL; env var REDIS_URL overrides; only used when backend=redis
single_flight_lock_ttl: 30               # Single-flight lock TTL (seconds); only one worker regenerates an expired key, others poll for the new value
single_flight_poll_interval_ms: 50       # Poll interval (ms) while waiting for the single-flight holder to populate the cache
single_flight_max_wait_ms: 5000          # Max time (ms) a follower will poll before giving up and computing the value itself

default_ttl_seconds: 120                 # Default cache TTL in seconds (2 minutes); used when no group_ttl matches
max_memory_mb: 256                       # Max memory for in-memory cache (MB); LRU eviction when exceeded

# ═══ PER-GROUP TTL OVERRIDES ═══
# Override TTL (seconds) by API path group; group derived from first path segment after /
# Shorter TTLs for rapidly-changing data; longer for expensive computations
group_ttls:
  dashboard: 60                          # Dashboard KPIs — refresh every 1 min (frequently viewed)
  accuracy: 300                          # Forecast accuracy metrics — 5 min (expensive aggregation, slow-changing)
  inv-planning: 120                      # Inventory planning endpoints — 2 min
  control-tower: 60                      # Control tower KPIs — 1 min (real-time operational view)
  domains: 180                           # Generic domain data (dim/fact tables) — 3 min
  inventory: 120                         # Inventory snapshots — 2 min
  ai-planner: 180                        # AI planner insights — 3 min (LLM calls are expensive)
  storyboard: 120                        # Storyboard narratives — 2 min
  fill-rate: 120                         # Fill rate metrics — 2 min
  clustering: 300                        # Clustering results — 5 min (rarely changes outside experiments)
  forecast: 300                          # Forecast data — 5 min (only changes on pipeline runs)
  jobs: 30                               # Job status — 30 sec (needs near-real-time updates)

# ═══ INVALIDATION RULES ═══
# Maps mutation endpoints (POST/PUT/DELETE) to cache groups that must be cleared
# Wildcard (*) matches any path segment; ensures stale data is evicted after writes
invalidation_rules:
  # --- Inventory planning mutations ---
  "POST /inv-planning/exceptions/generate":       # Regenerating exceptions invalidates inv-planning + control-tower views
    - "inv-planning"
    - "control-tower"
  "POST /inv-planning/exceptions/acknowledge":    # Acknowledging an exception updates inv-planning state
    - "inv-planning"
  "PUT /inv-planning/policy/assign":              # Assigning policy to SKUs changes planning calculations
    - "inv-planning"
  "POST /inv-planning/policy":                    # Creating a new policy
    - "inv-planning"
  "PUT /inv-planning/policy/*":                   # Updating an existing policy
    - "inv-planning"

  # --- AI planner mutations ---
  "POST /ai-planner/portfolio-scan":              # Running portfolio scan generates new insights
    - "ai-planner"
  "PUT /ai-planner/insights/*/status":            # Updating insight status (acknowledge, dismiss)
    - "ai-planner"
  "POST /ai-planner/analyze":                     # Running ad-hoc analysis
    - "ai-planner"

  # --- Storyboard mutations ---
  "POST /storyboard/generate":                    # Generating storyboard narratives
    - "storyboard"
    - "control-tower"                              # Storyboard feeds control tower exception view
  "PUT /storyboard/*/acknowledge":                # Acknowledging a storyboard exception
    - "storyboard"

  # --- Clustering mutations ---
  "POST /clustering/scenario":                    # Creating a new clustering scenario/experiment
    - "clustering"
  "POST /clustering/scenario/*/promote":          # Promoting a scenario affects accuracy + dashboard views
    - "clustering"
    - "accuracy"
    - "dashboard"

  # --- Competition / champion ---
  "POST /competition/run":                        # Running model competition updates accuracy + forecast + dashboard
    - "accuracy"
    - "forecast"
    - "dashboard"
  "PUT /competition/config":                      # Updating competition config changes accuracy metrics
    - "accuracy"

  # --- Job mutations ---
  "POST /jobs/*":                                 # Creating/triggering a job
    - "jobs"
  "DELETE /jobs/*":                               # Deleting a job
    - "jobs"

  # --- Domain data loads ---
  "POST /domains/*/reload":                       # Reloading domain data invalidates multiple downstream caches
    - "domains"
    - "dashboard"
    - "accuracy"
    - "inventory"

  # --- Forecast production ---
  "POST /forecast/production/generate":           # Generating production forecast invalidates forecast + inv-planning
    - "forecast"
    - "inv-planning"
