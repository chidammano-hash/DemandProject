# Auto-tune strategy definitions for XGBoost hyperparameter search.
#
# Each strategy is a named set of overrides applied on top of the base
# algorithm_config.yaml XGBoost section.  Only the keys that differ from the
# current production config need to be specified — everything else is inherited.
#
# Usage:
#   uv run python scripts/ml/auto_tune.py --model xgboost --strategies config/xgboost_tune_strategies.yaml --runs 5
#   uv run python scripts/ml/auto_tune.py --model xgboost --strategies config/xgboost_tune_strategies.yaml --runs 10
#
# After all runs complete the script prints a leaderboard and optionally
# promotes the best run's params into algorithm_config.yaml.

strategies:

  - label: "xgb_higher_lr_0.08"
    description: "Faster convergence with higher LR — needs fewer trees"
    overrides:
      learning_rate: 0.08
      n_estimators: 400

  - label: "xgb_lower_lr_0.01"
    description: "Very slow learning rate — requires many trees for convergence"
    overrides:
      learning_rate: 0.01
      n_estimators: 2500

  - label: "xgb_deep_trees"
    description: "Deeper trees (max_depth=10) with heavier regularization"
    overrides:
      max_depth: 10
      min_child_weight: 15
      reg_lambda: 5.0
      gamma: 0.2

  - label: "xgb_shallow_wide"
    description: "Shallow trees — faster training, less overfitting, more trees needed"
    overrides:
      max_depth: 4
      n_estimators: 2000
      reg_lambda: 1.0
      min_child_weight: 20

  - label: "xgb_dart_dropout"
    description: "DART booster with dropout — reduces overfitting by dropping trees"
    overrides:
      booster: "dart"
      rate_drop: 0.1
      skip_drop: 0.5
      learning_rate: 0.025
      n_estimators: 1500

  - label: "xgb_heavy_regularization"
    description: "Strong L1+L2 + gamma pruning — maximum overfitting protection"
    overrides:
      reg_lambda: 8.0
      reg_alpha: 1.0
      gamma: 0.3
      min_child_weight: 20

  - label: "xgb_column_sampling"
    description: "Aggressive column sampling at tree + level — feature-level regularization"
    overrides:
      colsample_bytree: 0.60
      colsample_bylevel: 0.70
      subsample: 0.75

  - label: "xgb_lossguide_leaf"
    description: "Leaf-wise splitting with max_leaves cap — mimics LightGBM strategy"
    overrides:
      grow_policy: "lossguide"
      max_leaves: 63
      max_depth: 0
      n_estimators: 1800

  - label: "xgb_max_bin_tuned"
    description: "Reduced histogram bins for faster training and regularization effect"
    overrides:
      max_bin: 128
      n_estimators: 1800
      learning_rate: 0.015

  - label: "xgb_champion_blend"
    description: "Best combination: lossguide + balanced sampling + slow LR + full feature set"
    overrides:
      grow_policy: "lossguide"
      max_leaves: 63
      max_bin: 128
      n_estimators: 2000
      learning_rate: 0.012
      max_depth: 8
      min_child_weight: 12
      subsample: 0.82
      colsample_bytree: 0.75
      colsample_bylevel: 0.80
      reg_lambda: 4.5
      reg_alpha: 0.25
      gamma: 0.15

  # ── Phase 3 strategies (advanced optimization) ────────────────────────

  - label: "xgb_ultra_slow_lr"
    description: "Ultra-slow convergence — 3000 trees at LR=0.008 for residual pattern capture"
    overrides:
      n_estimators: 3000
      learning_rate: 0.008

  - label: "xgb_127_leaves"
    description: "Expanded leaf complexity — 127 leaves + depth=10 with heavier regularization"
    overrides:
      max_leaves: 127
      max_depth: 10
      reg_lambda: 6.0
      gamma: 0.20

  - label: "xgb_hist_256bins"
    description: "Histogram precision — 256 bins for finer splits on continuous features"
    overrides:
      max_bin: 256
      max_depth: 10
      max_leaves: 127
      reg_lambda: 6.0
      gamma: 0.20

  - label: "xgb_dart_v3"
    description: "Conservative DART — 5% drop rate with V3 features and 256 bins"
    overrides:
      booster: "dart"
      rate_drop: 0.05
      skip_drop: 0.60
      learning_rate: 0.010
      n_estimators: 2500
      max_bin: 256
      max_leaves: 127

  - label: "xgb_champion_v2"
    description: "Phase 3 champion: DART + 256 bins + 127 leaves + balanced reg + ultra-slow LR"
    overrides:
      n_estimators: 2800
      learning_rate: 0.009
      max_depth: 10
      min_child_weight: 10
      subsample: 0.82
      colsample_bytree: 0.75
      colsample_bylevel: 0.85
      reg_lambda: 5.5
      reg_alpha: 0.30
      gamma: 0.12
      max_bin: 256
      grow_policy: "lossguide"
      max_leaves: 127
      booster: "dart"
      rate_drop: 0.05
      skip_drop: 0.60
