# 08-02: Authentication & RBAC configuration

jwt:
  algorithm: HS256
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7

password_policy:
  min_length: 8

# Role hierarchy: admin > manager > planner > viewer
# Each role inherits permissions of all lower roles
role_permissions:
  viewer:
    - "GET"
  planner:
    - "GET"
    - "POST"
    - "PUT"
  manager:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
  admin:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "ADMIN"

# Role hierarchy level (higher number = more privileges)
role_level:
  viewer: 1
  planner: 2
  manager: 3
  admin: 4

# API Governance (merged from api_governance_config.yaml — Spec 08-09)
governance:
  rate_limit_tiers:
    free:
      requests_per_minute: 60
    standard:
      requests_per_minute: 300
    premium:
      requests_per_minute: 1000
  deprecation:
    sunset_header: true
  versioning:
    current_version: v1
    supported_versions:
      - v1
