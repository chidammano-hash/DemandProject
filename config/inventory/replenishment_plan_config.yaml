# Forward-Looking Replenishment Plan Configuration
# Script: scripts/compute_replenishment_plan.py
# Output: fact_replenishment_plan
# Sources: fact_production_forecast (CI bands) + fact_sku_policy_assignment + fact_safety_stock_targets
#
# All configurable parameters are defined here — no magic numbers in the compute script.

_includes: [shared_constants]

replenishment_plan:

  # ---------------------------------------------------------------------------
  # Demand variability method
  # ---------------------------------------------------------------------------
  # How to derive sigma_demand_monthly from the production forecast CI bands.
  # 'ci_spread': sigma = (forecast_qty_upper - forecast_qty_lower) / (2 * z_ci)
  # Assumes the forecast CI is a symmetric normal interval at confidence level ci_confidence.
  sigma_method: ci_spread
  ci_confidence: 0.80            # CI band confidence level (P10/P90 = 80% interval)
  ci_z_score: 1.282              # Z for 80% CI (one-tailed P10/P90; must match ci_confidence)

  # Fallback when CI bands are NULL (e.g. SKUs not yet covered by production forecast):
  # use dim_sku.demand_std as sigma_demand_monthly directly.
  fallback_to_historical: true

  # Inherited from shared_constants.yaml via _includes:
  #   service_levels, z_table, min_ss_days, max_ss_days, lt_std_fallback_pct,
  #   costs.{default_ordering_cost, default_holding_cost_pct, default_unit_cost, default_moq}

  # ---------------------------------------------------------------------------
  # Lead time defaults
  # ---------------------------------------------------------------------------
  # Used when dim_item_lead_time_profile has no entry for an item-location pair.
  lt_default_days: 14

  # ---------------------------------------------------------------------------
  # EOQ / cycle stock parameters
  # ---------------------------------------------------------------------------
  # Number of forward months to sum for annualized demand (forecast_annual_demand).
  eoq_annualization_months: 12

  constraints:
    max_eoq_months_supply: 6           # Cap EOQ at this many months of avg demand
    min_annual_demand: 0.001           # Skip SKUs with effectively zero demand

  # ---------------------------------------------------------------------------
  # Forward horizon
  # ---------------------------------------------------------------------------
  # How many forward months to compute per SKU per run (max 18).
  # T+1 through T+horizon_months rows are written per SKU.
  horizon_months: 12

  # ---------------------------------------------------------------------------
  # Policy-type dispatch
  # ---------------------------------------------------------------------------
  # Governs which replenishment parameters are populated per policy_type.
  #   continuous_rop   — populates reorder_point + order_qty (= effective_eoq)
  #   periodic_review  — populates order_up_to_level; review_cycle_days drives demand coverage
  #   min_max          — populates reorder_point (min) + order_up_to_level (max)
  #   manual / jit     — sets is_jit = TRUE; all replenishment parameters are NULL
  default_policy_type: continuous_rop   # Applied when SKU has no policy assignment

  # ---------------------------------------------------------------------------
  # Output / batching
  # ---------------------------------------------------------------------------
  # Rows per INSERT ... ON CONFLICT (DO UPDATE) batch.
  batch_size: 1000
