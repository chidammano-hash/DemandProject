# Tuning Advisor — AI-powered LGBM hyperparameter tuning chat
# Used by common/ai/tuning_advisor.py

# LLM provider and model
provider: "openai"         # "openai" or "anthropic"
model: "gpt-4o"            # needs function-calling / tool_use support
max_tokens: 4096
temperature: 0.3

# Agentic loop limits
max_turns: 20
token_budget: 50000

# Safety limits — prevent runaway experimentation
max_concurrent_runs: 1            # max active runs at once
require_confirmation: true        # AI cannot auto-start runs
min_seconds_between_runs: 300     # 5-minute cooldown

# Conversation context
max_history_messages: 40          # sliding window for LLM context
