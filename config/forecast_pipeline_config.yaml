# ═══════════════════════════════════════════════════════════════════════════
# forecast_pipeline_config.yaml — Single source of truth for the ML forecast pipeline
# ═══════════════════════════════════════════════════════════════════════════
#
# Consolidates settings from (now deprecated):
#   - model_competition.yaml     → champion section
#   - lgbm_tuning_config.yaml    → tracking section
#   - production_forecast_config.yaml → production_forecast section
#
# Model-specific hyperparams remain in algorithm_config.yaml.
# This file governs WHICH models run and HOW the pipeline operates.
#
# Pipeline stages:  cluster → tune → backtest → load → compete → forecast

# ── Algorithm Roster ──────────────────────────────────────────────────────
# Master list. `enabled: false` disables across ALL pipeline stages.
#
# Lifecycle flags:
#   tune:     Include in hyperparameter tuning (Bayesian/Optuna)
#   backtest: Include in expanding-window backtest
#   compete:  Include in champion model selection horse race
#   forecast: Eligible for production forecast (has .pkl artifacts)
#   expert:   Available for expert system archetype routing

algorithms:
  lgbm_cluster:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster             # per_cluster | global
    config_key: lgbm                          # key in algorithm_config.yaml#algorithms
    output_dir: data/backtest/lgbm_cluster

  catboost_cluster:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    config_key: catboost
    output_dir: data/backtest/catboost_cluster

  xgboost_cluster:
    type: tree
    enabled: true
    tune: true
    backtest: true
    compete: true
    forecast: true
    expert: false
    cluster_strategy: per_cluster
    config_key: xgboost
    output_dir: data/backtest/xgboost_cluster

  chronos:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: false                            # superseded by chronos2
    forecast: false                           # zero-shot, no .pkl
    expert: true
    config_key: chronos
    output_dir: data/backtest/chronos

  chronos_bolt:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: false
    config_key: chronos_bolt
    output_dir: data/backtest/chronos_bolt

  chronos2:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: false
    config_key: chronos2
    output_dir: data/backtest/chronos2

  chronos2_enriched:
    type: foundation
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: false
    config_key: chronos2_enriched
    output_dir: data/backtest/chronos2_enriched

  mstl:
    type: statistical
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: true
    config_key: mstl
    output_dir: data/backtest/mstl

  nbeats:
    type: deep_learning
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: true
    config_key: nbeats
    output_dir: data/backtest/nbeats

  nhits:
    type: deep_learning
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: false
    config_key: nhits
    output_dir: data/backtest/nhits

  seasonal_naive:
    type: statistical
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: false
    cluster_strategy: per_cluster
    config_key: seasonal_naive
    output_dir: data/backtest/seasonal_naive

  rolling_mean:
    type: statistical
    enabled: true
    tune: false
    backtest: true
    compete: true
    forecast: false
    expert: true
    cluster_strategy: per_cluster
    config_key: rolling_mean
    output_dir: data/backtest/rolling_mean


# ── Backtest Settings ─────────────────────────────────────────────────────
backtest:
  n_timeframes: 10
  embargo_months: 1                # ALIGNED with tuning gap_months (was 0)
  forecast_horizon: 6              # months predicted per timeframe
  early_stop_pct: 0.03
  shap_retrain_threshold: 0.10
  n_seeds: 1
  tweedie_variance_power: 1.5
  intermittent_threshold: 0.7
  lumpy_threshold: 0.3
  output_dir: data/backtest

# ── Tuning Settings ───────────────────────────────────────────────────────
tuning:
  n_trials: 50
  n_splits: 5
  gap_months: 1                    # ALIGNED with backtest embargo_months
  val_months_per_fold: 3
  min_train_months: 13
  early_stopping_rounds: 50
  n_estimators_max: 2000
  n_estimators_buffer: 1.1
  random_seed: 42
  output_dir: data/tuning
  # Optuna search spaces remain in hyperparameter_tuning.yaml
  search_space_ref: hyperparameter_tuning.yaml

# ── Champion Selection ────────────────────────────────────────────────────
# Competing models are derived from algorithms[*].compete == true
champion:
  strategy: hybrid_warmup
  strategy_params:
    min_prior_months: 3
    warmup_strategy: rolling
    warmup_window: 2
    warmup_min_prior: 1
    primary_strategy: adaptive_ensemble
    primary_top_k: 3
    primary_weight_method: inverse_wape
  fallback_model_id: seasonal_naive
  metric: accuracy_pct
  lag: execution
  min_sku_rows: 3
  min_dfu_rows: 3
  champion_model_id: champion       # model_id written to fact table for winners
  meta_learner:
    model_type: random_forest
    n_estimators: 200
    max_depth: 15
    test_months: 3
    performance_window: 6

# ── Production Forecast ───────────────────────────────────────────────────
production_forecast:
  horizon_months: 24               # Forecast T+1 through T+24 (was 18)
  lookback_months: 36              # Months of sales history loaded (was 24)
  min_history_months: 12           # Below this → cold-start model routing
  cold_start_model_id: rolling_mean  # Fallback for DFUs with 3-11 months history
  cold_start_min_months: 3         # Absolute floor — DFUs with < 3 months skipped
  fallback_model_id: lgbm_cluster  # Default for mature DFUs without champion assignment
  recursive: true
  plan_version_format: "%Y-%m"
  keep_last_n_versions: 3
  confidence_interval:
    enabled: true
    source_model_ids:
      - lgbm_cluster
      - catboost_cluster
      - xgboost_cluster
    residual_lag: 0
    min_residual_months: 6
    z_lower: 1.282                 # P10
    z_upper: 1.282                 # P90
    horizon_scaling: sqrt
    sigma_floor: 1.0
    sigma_cap_multiplier: 3.0
  model_registry:
    base_path: "data/models"
  scheduler:
    job_type: generate_production_forecast
    cron: "0 6 2 * *"

# ── Run Tracking ──────────────────────────────────────────────────────────
tracking:
  backup_dir: data/backtest/tuning_archive
  auto_register: true
  auto_compare_to_latest: true
  improvement_threshold_bps: 5
  verdicts:
    improved_min_delta_accuracy: 0.05
    degraded_max_delta_accuracy: -0.05
  max_archive_runs: 50

# ── Clustering ────────────────────────────────────────────────────────────
# DFU clustering: segments DFUs by demand patterns into ml_cluster groups.
# Must run BEFORE backtest (backtest reads ml_cluster from dim_sku).
# Detailed ML params (k_range, labeling thresholds) stay in clustering_config.yaml.
# Per-cluster hyperparameter profiles stay in cluster_tuning_profiles.yaml.
clustering:
  enabled: true                        # false → skip clustering; backtest falls back to global
  config_ref: clustering_config.yaml
  tuning_profiles_ref: cluster_tuning_profiles.yaml
  experiment_templates_ref: cluster_experiment_templates.yaml
  steps:
    generate_features: true
    train_model: true
    label_clusters: true
    update_db: true
  artifacts:
    features_csv: data/clustering_features.csv
    output_dir: data/clustering
  db_target:
    table: dim_sku
    column: ml_cluster

# ── Backtest Sampling ────────────────────────────────────────────────────
# Stratified DFU sampling for fast backtest iteration (~5K of ~50K DFUs).
# Sampling is stratified BY CLUSTER — requires clustering first.
# Replaces backtest_sampling_config.yaml (kept for backward compat).
backtest_sampling:
  enabled: true                        # false → always run full population backtest
  default_target_n: 5000
  default_method: proportional         # proportional | equal | sqrt
  min_per_cluster: 10
  max_target_n: 20000
  seed: 42
  representativeness_threshold: 0.05   # KS stat threshold for sample quality

# ── Pipeline Stages ──────────────────────────────────────────────────────
# Documents the dependency chain and execution order.
# Consumed by Makefile targets. See `make setup-backtest` for full chain.
pipeline:
  stages:
    - name: clustering
      description: "Segment DFUs into demand-pattern clusters"
      makefile_target: cluster-all
      depends_on: []
      enabled_by: clustering.enabled
    - name: backtest
      description: "Expanding-window backtest for all enabled algorithms"
      makefile_target: backtest-all
      depends_on: [clustering]
      enabled_by: "always"
    - name: load
      description: "Load backtest predictions into Postgres"
      makefile_target: backtest-load-all-bulk
      depends_on: [backtest]
      enabled_by: "always"
    - name: champion
      description: "Select best model per DFU from backtest results"
      makefile_target: champion-all
      depends_on: [load]
      enabled_by: "always"
    - name: forecast
      description: "Generate production forecasts using champion models"
      makefile_target: forecast-generate
      depends_on: [champion]
      enabled_by: "always"
  auxiliary:
    - name: seasonality
      description: "Detect per-DFU seasonality profiles"
      makefile_target: seasonality-all
    - name: variability
      description: "Compute per-DFU demand variability class"
      makefile_target: variability-all
