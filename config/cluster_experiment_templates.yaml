# Cluster Experiment Templates
# Pre-configured clustering parameter sets for the Cluster Experimentation Studio
# Production baseline loads live defaults from clustering_config.yaml

templates:
  - id: production_baseline
    label: "Production Baseline"
    description: "Current production parameters from clustering_config.yaml"
    source: clustering_config

  - id: high_k_granular
    label: "High-K Granular"
    description: "More clusters (12-25) for finer demand segmentation"
    model_params:
      k_range: [12, 25]
      min_cluster_size_pct: 1.5

  - id: low_k_broad
    label: "Low-K Broad"
    description: "Fewer clusters (3-8) for robust per-cluster model training"
    model_params:
      k_range: [3, 8]
      min_cluster_size_pct: 5.0

  - id: seasonal_focus
    label: "Seasonal Focus"
    description: "48-month window with lower seasonality threshold to capture seasonal clusters"
    feature_params:
      time_window_months: 48
    label_params:
      seasonality_threshold: 0.2

  - id: intermittent_specialist
    label: "Intermittent Specialist"
    description: "Tuned for intermittent demand detection with lower zero-demand threshold"
    label_params:
      zero_demand_threshold: 0.1
      cv_volatile: 0.6

  - id: pca_compressed
    label: "PCA Compressed"
    description: "All features with PCA dimensionality reduction to 10 components"
    model_params:
      all_features: true
      use_pca: true
      pca_components: 10

  - id: recent_data_focus
    label: "Recent Data Focus"
    description: "18-month window to capture recent demand pattern shifts"
    feature_params:
      time_window_months: 18
      min_months_history: 6
