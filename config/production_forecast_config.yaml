# Production Forecast Generation Config — F1.1
# Controls the generate_production_forecasts.py inference pipeline.

inference:
  horizon_months: 18          # How many months ahead to forecast (T+1 through T+18)
  recursive: true             # Use recursive inference: lag_1 for T+2 = model's T+1 prediction

confidence_interval:
  enabled: true               # Set to false to skip CI band computation entirely
  # Source of backtest residuals used to estimate per-SKU sigma
  source_model_ids:           # models whose backtest residuals are pooled
    - lgbm_cluster
    - catboost_cluster
    - xgboost_cluster
  residual_lag: 0             # Lag-0 = execution-lag residuals (closest to production forecast)
  min_residual_months: 6      # Min backtest months needed for SKU-level sigma; else use cluster fallback
  # Z-scores for lower/upper bounds (1.282 ≈ P10/P90, 1.645 ≈ P5/P95)
  z_lower: 1.282
  z_upper: 1.282
  # Horizon uncertainty growth model: "sqrt" (random-walk), "linear", or "none" (flat)
  horizon_scaling: sqrt
  # Guard rails applied to sigma before CI computation
  sigma_floor: 1.0            # Minimum sigma in units (avoids degenerate zero-width CIs)
  sigma_cap_multiplier: 3.0   # Cap sigma at this multiple of the global median sigma

model_selection:
  strategy: champion          # 'champion' = use each SKU's current champion model assignment
  fallback_model_id: lgbm_cluster  # fallback when no champion is assigned

plan_version:
  format: "%Y-%m"             # e.g. '2026-03' from the run date
  keep_last_n_versions: 3     # retain this many plan versions; older versions are purged

model_registry:
  base_path: "data/models"    # root directory for persisted .pkl files
  # Subdirectory structure: data/models/<model_id>/cluster_<N>.pkl
  # e.g. data/models/lgbm_cluster/cluster_3.pkl

scheduler:
  job_type: generate_production_forecast
  cron: "0 6 2 * *"          # 2nd of each month at 06:00 UTC (after previous month's sales close)
