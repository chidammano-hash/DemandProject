services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: demand_mvp
      POSTGRES_USER: demand
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demand}
    # NOTE: this is a YAML folded scalar (`>`) — every indented line below is
    # LITERAL text concatenated into the postgres command. Do NOT put `#`
    # comments inside it; they are not stripped and break Compose parsing.
    # max_connections=200 (dev headroom). Multi-pool invariant the API must
    # satisfy against THIS (primary) ceiling:
    #   GUNICORN_WORKERS x (POOL_MAX_SIZE + ASYNC_POOL_MAX_SIZE) + overhead
    #       <= max_connections
    # Defaults: 4 x (12 + 20) = 128 <= 200. The read-replica pool
    # (GUNICORN_WORKERS x READ_POOL_MAX_SIZE) counts against the REPLICA's
    # own max_connections, not this one. Enforced by `make deploy-check`.
    command: >
      postgres
      -c shared_buffers=4GB
      -c work_mem=128MB
      -c maintenance_work_mem=1GB
      -c effective_cache_size=12GB
      -c max_connections=200
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=64MB
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_worker_processes=12
      -c huge_pages=try
      -c log_min_duration_statement=5000
      -c track_io_timing=on
      -c default_statistics_target=200
    shm_size: 5gb
    ports:
      - "${POSTGRES_HOST_PORT:-5440}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/001_create_dim_item.sql:/docker-entrypoint-initdb.d/001_create_dim_item.sql:ro
      - ./sql/002_create_dim_location.sql:/docker-entrypoint-initdb.d/002_create_dim_location.sql:ro
      - ./sql/003_create_dim_customer.sql:/docker-entrypoint-initdb.d/003_create_dim_customer.sql:ro
      - ./sql/004_create_dim_time.sql:/docker-entrypoint-initdb.d/004_create_dim_time.sql:ro
      - ./sql/005_create_dim_dfu.sql:/docker-entrypoint-initdb.d/005_create_dim_dfu.sql:ro
      - ./sql/006_create_fact_sales_monthly.sql:/docker-entrypoint-initdb.d/006_create_fact_sales_monthly.sql:ro
      - ./sql/007_create_fact_external_forecast_monthly.sql:/docker-entrypoint-initdb.d/007_create_fact_external_forecast_monthly.sql:ro
      - ./sql/009_create_chat_embeddings.sql:/docker-entrypoint-initdb.d/009_create_chat_embeddings.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demand -d demand_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.0.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
    command: >
      bash -c "pip install -q psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql://demand:demand@postgres:5432/demand_mvp
      --default-artifact-root mlflow-artifacts:/
      --serve-artifacts
      --artifacts-destination /mlruns
      --host 0.0.0.0
      --port 5000"
    ports:
      - "${MLFLOW_HOST_PORT:-5003}:5000"
    volumes:
      - mlflow_data:/mlruns

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # API container — built from the project root Dockerfile (gunicorn +
  # uvicorn workers). Uses the Docker network to reach postgres + redis,
  # so POSTGRES_HOST/REDIS_URL override the localhost defaults from .env.
  api:
    build: .
    env_file:
      - .env
    environment:
      # Override .env values that point at host-machine names (localhost,
      # 5440) so the container hits the in-network service names instead.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  mlflow_data:
  redis_data:
