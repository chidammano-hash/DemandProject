name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Run backend tests with coverage gate
        # 70% threshold lives in pyproject.toml [tool.coverage.report].fail_under
        run: |
          uv run pytest tests/ \
            --cov \
            --cov-fail-under=70 \
            -v --tb=short

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint (Python)
        # Baseline has known violations; this job currently surfaces them but
        # doesn't fail the build. TODO: drop `|| true` once the existing 3k+
        # baseline is cleaned up.
        run: uv run ruff check . || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: ESLint (frontend)
        # TODO: drop `|| true` once frontend warnings are cleaned up.
        run: cd frontend && npm run lint || true

  type-check-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Mypy
        # pyproject.toml mypy config has ignore_missing_imports=true. Soft-fail
        # until existing type errors are cleaned up. TODO: drop `|| true`.
        run: uv run mypy api/ common/ || true

  type-check-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

  audit-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit router consistency
        # Prefer the standalone script; fall back to the make target.
        run: |
          if [ -f scripts/tools/audit_routes.py ]; then
            python scripts/tools/audit_routes.py
          else
            make audit-routers
          fi

  unenforced-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CLAUDE.md unenforced-rule gates
        run: bash scripts/ai_checks/check_unenforced_rules.sh
