experiment:
  name: "adv_expert_panel_v1"
  seed: 42
  n_dfus: 5000
  sampling_method: "proportional"
  n_timeframes: 10
  n_workers: 14
  output_dir: "adv_algorithm_testing/results"
  loc_filter: null                  # e.g. '1401-BULK' — runs all DFUs at that loc instead of sampling

demand_classification:
  adi_threshold: 1.32
  cv2_threshold: 0.49
  high_volume_percentile: 90
  min_history_months: 6

# --- Inherited from base expert panel (algorithm_testing) ---
statistical_models:
  holt_winters:
    enabled: true
    seasonal_periods: 12
    trend: "add"
    seasonal: "add"
    damped_trend: true
    min_history: 25
  simple_es:
    enabled: true
    smoothing_level: null
    min_history: 3
  croston_sba:
    enabled: true
    alpha: 0.1
    min_history: 6
    min_nonzero: 2
  auto_arima:
    enabled: true
    max_p: 3
    max_q: 3
    seasonal: true
    m: 12
    min_history: 24
  theta:
    enabled: true
    period: 12
    min_history: 12

tree_models:
  lgbm:
    enabled: true
    use_existing_config: true
  catboost:
    enabled: true
    use_existing_config: true
  xgboost:
    enabled: true
    use_existing_config: true

baselines:
  seasonal_naive:
    enabled: true
    min_history: 12
  rolling_mean:
    enabled: true
    window: 6
    min_history: 6
  ridge:
    enabled: true
    alpha: 100.0
  dlinear:
    enabled: true
  nlinear:
    enabled: true

# --- NEW: Statistical upgrades (Expert 1,3,4,5 enhancements) ---
statistical_upgrades:
  autoces:
    enabled: true
    season_length: 12
    min_history: 12
  dynamic_theta:
    enabled: true
    season_length: 12
    min_history: 12
  imapa:
    enabled: true
    min_history: 6
    min_nonzero: 2
  tsb:
    enabled: true
    alpha_d: 0.1
    alpha_p: 0.1
    min_history: 6
    min_nonzero: 2
  adida:
    enabled: true
    min_history: 6
    min_nonzero: 2
  mstl:
    enabled: true
    season_length: 12
    min_history: 25

# --- NEW: Deep learning models ---
deep_learning:
  nbeats:
    enabled: true
    variant: "generic"          # generic | interpretable
    input_size: 24              # lookback window (months)
    h: 6                        # forecast horizon (months)
    max_steps: 500
    batch_size: 32
    learning_rate: 0.001
    min_history: 24
  nhits:
    enabled: true
    input_size: 24
    h: 6
    max_steps: 500
    batch_size: 32
    learning_rate: 0.001
    min_history: 24
  tft:
    enabled: true               # Apple MPS GPU available
    input_size: 24
    h: 6
    max_steps: 500
    batch_size: 32
    learning_rate: 0.001
    min_history: 18
    hidden_size: 64
  deepar:
    enabled: true
    input_size: 24
    h: 6
    max_steps: 500
    batch_size: 32
    learning_rate: 0.001
    min_history: 18
  tide:
    enabled: true
    input_size: 24
    h: 6
    max_steps: 500
    batch_size: 32
    learning_rate: 0.001
    min_history: 12
  tcn:
    enabled: true               # Apple MPS GPU available
    input_size: 24
    h: 6
    max_steps: 500
    batch_size: 32
    learning_rate: 0.001
    min_history: 12
  patchtst:
    enabled: true               # Apple MPS GPU available
    input_size: 36
    h: 6
    max_steps: 500
    batch_size: 32
    patch_len: 12
    min_history: 36
  itransformer:
    enabled: false              # disabled: outputs near-zero on MPS (negative preds clipped to 0 → WAPE=100%)
    input_size: 24
    h: 6
    max_steps: 500
    batch_size: 32
    min_history: 24

# --- NEW: Foundation models ---
foundation_models:
  chronos_bolt:
    enabled: true               # fast native encoder — 250x faster than T5
    model_size: "base"          # small | base
    device: "mps"               # Apple Silicon GPU
    batch_size: 512
    prediction_length: 6
    num_samples: 12
  chronos:
    enabled: false              # T5-based — slower, higher memory
    model_size: "small"         # tiny | mini | small | base | large
    device: "mps"               # Apple Silicon GPU
    batch_size: 32
    prediction_length: 6
    num_samples: 20             # for probabilistic forecasts
  timesfm:
    enabled: false              # requires separate install
    context_length: 512
    prediction_length: 6
    device: "auto"
  moirai:
    enabled: false              # local, no API key — pip install 'uni2ts[torch]'
    model_size: "small"         # small | base | large
    prediction_length: 6
    context_length: 200
    device: "mps"               # Apple Silicon GPU
    batch_size: 32
    num_samples: 20
  timegpt:
    enabled: false              # requires API key (NIXTLA_API_KEY)
    prediction_length: 6
    level: [90]                 # prediction interval levels
  lag_llama:
    enabled: false              # local, no API key — pip install lag-llama from GitHub
    prediction_length: 6
    context_length: 32
    device: "mps"               # Apple Silicon GPU
    num_samples: 20
    batch_size: 64

# --- NEW: Cross-sectional reconciliation ---
reconciliation:
  enabled: false                # disabled by default, needs hierarchy definition
  method: "mint_shrink"         # mint_shrink | wls | ols | bottom_up
  hierarchy:
    - item_id
    - category
    - brand_name
    - total

comparison:
  external_forecast_model_id: "external"
  champion_model_ids:
    - lgbm_cluster
    - catboost_cluster
    - xgboost_cluster

portfolio_optimizer:
  max_algorithms: null          # null → optimize_greedy (per-segment best), int → optimize_constrained
  min_segment_dfus: 30
  min_dfu_coverage_pct: 0.5    # coverage threshold — below this, accuracy gets coverage-weighted
  coverage_weighted: true      # adj_acc = cov*algo_acc + (1-cov)*naive_acc for low-coverage algos
  naive_floor: true            # never assign algo worse than seasonal_naive per segment

compute:
  gpu_detection: "on"           # Apple Silicon MPS GPU enabled
  device: "mps"                 # Apple Metal Performance Shaders
  max_training_time_minutes: 30
  fallback_on_error: true       # fall back to CPU on MPS failures

hybrid_ensemble:
  enabled: true
  min_n_months: 2
  meta_n_estimators: 300
  meta_learning_rate: 0.05
  meta_num_leaves: 31
  confidence_threshold: 0.6
  blend_top_k: 3
